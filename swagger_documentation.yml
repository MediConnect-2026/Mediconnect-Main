  # --- CONVERSACIONES ENDPOINTS ---
  /conversaciones:
    get:
      summary: Obtener conversaciones del usuario
      tags:
        - Conversaciones
      description: |
        Obtiene todas las conversaciones del usuario autenticado con soporte para filtros y paginación.
        
        **WebSocket:** Los cambios se notifican en tiempo real
      security:
        - bearerAuth: []
      parameters:
        - name: estado
          in: query
          required: false
          schema:
            type: string
            enum: [Activa, Archivada, Bloqueada]
        - name: silenciado
          in: query
          required: false
          schema:
            type: boolean
        - name: busqueda
          in: query
          required: false
          schema:
            type: string
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Conversaciones obtenidas exitosamente
        '401':
          description: No autenticado

    post:
      summary: Crear una nueva conversación
      tags:
        - Conversaciones
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - receptorId
              properties:
                receptorId:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Conversación creada exitosamente
        '409':
          description: Ya existe una conversación con ese usuario

  /conversaciones/obtener-o-crear:
    post:
      summary: Obtener o crear conversación
      tags:
        - Conversaciones
      description: Obtiene una conversación existente o crea una nueva si no existe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - receptorId
              properties:
                receptorId:
                  type: integer
                  example: 3
      responses:
        '200':
          description: Conversación obtenida o creada

  /conversaciones/{id}:
    get:
      summary: Obtener conversación por ID
      tags:
        - Conversaciones
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conversación obtenida exitosamente
        '403':
          description: No tienes acceso a esta conversación

    patch:
      summary: Actualizar conversación (silenciar/archivar/bloquear)
      tags:
        - Conversaciones
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                silenciado:
                  type: boolean
                estado:
                  type: string
                  enum: [Activa, Archivada, Bloqueada]
                  example: "Activa"
                  description: Estado de la conversación
      responses:
        '200':
          description: Conversación actualizada

    delete:
      summary: Eliminar conversación
      tags:
        - Conversaciones
      description: Elimina la conversación y todos sus mensajes (irreversible)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conversación eliminada

  # --- MENSAJES ENDPOINTS ---
  /conversaciones/{conversacionId}/mensajes:
    get:
      summary: Obtener mensajes de una conversación
      tags:
        - Mensajes
      description: |-
        Lista los mensajes de una conversación con paginación basada en número de página.

        **Orden:** Los mensajes se devuelven de **más reciente a más antiguo** (ID descendente).
        La página 1 siempre contiene los mensajes más recientes.

        **Paginación por página:**
        ```
        GET /conversaciones/1/mensajes?pagina=1&limite=20   → mensajes más recientes
        GET /conversaciones/1/mensajes?pagina=2&limite=20   → mensajes anteriores
        ```

        **Paginación por cursor (`antesDeId`):**
        Para scroll infinito hacia atrás, usa `antesDeId` con el ID del mensaje más antiguo cargado.
        ```
        GET /conversaciones/1/mensajes?antesDeId=45&limite=20
        ```
      security:
        - bearerAuth: []
      parameters:
        - name: conversacionId
          in: path
          required: true
          schema:
            type: integer
        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: "Número de página (1-indexed). Página 1 = mensajes más recientes"
          example: 1
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Mensajes por página
          example: 20
        - name: antesDeId
          in: query
          required: false
          schema:
            type: integer
          description: "Cursor: retorna mensajes con ID menor al indicado (para scroll infinito)"
          example: 45
        - name: tipo
          in: query
          required: false
          schema:
            type: string
            enum: [texto, imagen, video, audio, archivo]
        - name: busqueda
          in: query
          required: false
          schema:
            type: string
          description: Filtrar mensajes que contengan este texto
      responses:
        '200':
          description: Mensajes obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: "Mensajes obtenidos exitosamente"
                  paginacion:
                    type: object
                    properties:
                      pagina:
                        type: integer
                        example: 1
                      limite:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        description: Total de mensajes en la conversación
                        example: 87
                      hayMas:
                        type: boolean
                        description: Si hay más páginas disponibles
                        example: true
                  data:
                    type: array
                    description: Mensajes ordenados de más reciente a más antiguo
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 87
                        conversacionId:
                          type: integer
                          example: 1
                        remitenteId:
                          type: integer
                          example: 5
                        contenido:
                          type: string
                          example: "Hola, ¿cómo estás?"
                        tipo:
                          type: string
                          example: "texto"
                        estado:
                          type: string
                          example: "Enviado"
                        enviadoEn:
                          type: string
                          format: date-time
                        esPropio:
                          type: boolean
                          description: Si el mensaje fue enviado por el usuario autenticado
                          example: true
                        remitente:
                          type: object
                          properties:
                            id:
                              type: integer
                            nombre:
                              type: string
                            apellido:
                              type: string
                            fotoPerfil:
                              type: string
                              nullable: true
        '403':
          description: No tienes acceso a esta conversación
        '401':
          description: No autenticado

    post:
      summary: Enviar un nuevo mensaje
      tags:
        - Mensajes
      description: Envía un mensaje de texto o con media adjunto. Notifica en tiempo real vía WebSocket
      security:
        - bearerAuth: []
      parameters:
        - name: conversacionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contenido:
                  type: string
                  example: Hola, ¿cómo estás?
                tipo:
                  type: string
                  enum: [Texto, Imagen, Video, Audio, Archivo]
                  default: Texto
                mediaId:
                  type: integer
      responses:
        '201':
          description: Mensaje enviado exitosamente

  /conversaciones/{conversacionId}/marcar-leidos:
    post:
      summary: Marcar mensajes como leídos
      tags:
        - Mensajes
      security:
        - bearerAuth: []
      parameters:
        - name: conversacionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ultimoMensajeLeidoId
              properties:
                ultimoMensajeLeidoId:
