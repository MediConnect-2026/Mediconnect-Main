                  type: integer
                  example: 1
                idTipoSeguro:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Seguro agregado exitosamente
        '400':
          description: Error - Ya tiene 3 seguros o seguro duplicado

    get:
      tags:
        - Seguros
      summary: Obtener mis seguros (Paciente)
      description: |-
        Obtiene los seguros del paciente autenticado. Por defecto solo muestra seguros activos.
        
        **Historial:**
        Los seguros eliminados se marcan como "Eliminado" (no se borran). 
        Usa `incluirHistorial=true` para ver el historial completo.
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
