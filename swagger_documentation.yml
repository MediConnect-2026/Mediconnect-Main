        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar un barrio
      tags:
        - Barrios
      description: Actualiza el nombre, sección y/o estado de un barrio existente. Al menos uno de los campos debe ser proporcionado.
      parameters:
        - name: id
