                    type: object
                    properties:
                      bannerUrl:
                        type: string
                        example: "https://avjupegentogqimsrxkg.supabase.co/storage/v1/object/public/public-assets/users/123/banner.jpg"
                        description: URL pública del nuevo banner en Supabase
        '400':
