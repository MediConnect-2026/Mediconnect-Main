  # --- HORARIOS ENDPOINTS ---
  /horarios:
    get:
      summary: Listar todos los horarios
      tags:
        - Horarios
      description: |
        Obtiene una lista de todos los horarios del sistema. 

        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/servicios-horarios?target=en&translate_fields=descripcion`
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: Idioma destino para traducción automática (activa la traducción)
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "descripcion,nombre"
          description: Campos a traducir separados por comas (ejemplo: "descripcion,nombre")
      responses:
        '200':
          description: Horarios obtenidos exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Horario'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Crear un nuevo horario
      tags:
        - Horarios
      description: Crea un nuevo horario para un doctor en una ubicación específica. El horario especifica un bloque de tiempo en un día de la semana.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctorId:
                  type: integer
                  example: 1
                  description: ID del doctor
                nombre:
                  type: string
                  example: "Bloque Matutino"
                  description: Nombre descriptivo del bloque horario
                diaSemana:
                  type: integer
                  enum: [0, 1, 2, 3, 4, 5, 6]
                  example: 1
                  description: Día de la semana (0=Domingo, 1=Lunes, ..., 6=Sábado)
                horaInicio:
                  type: string
                  example: "08:00"
                  description: Hora de inicio en formato HH:mm o HH:mm:ss
                horaFin:
                  type: string
                  example: "12:00"
                  description: Hora de fin en formato HH:mm o HH:mm:ss
                ubicacionId:
                  type: integer
                  example: 2
                  description: ID de la ubicación donde se atiende
              required:
                - doctorId
                - nombre
                - diaSemana
                - horaInicio
                - horaFin
                - ubicacionId
      responses:
        '201':
          description: Horario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Horario'
        '400':
          description: Datos inválidos o campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto de horario (se superpone con otro existente)
          content:
            application/json:
