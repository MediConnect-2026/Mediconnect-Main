  # --- PATIENT SELF-MANAGEMENT ENDPOINTS ---
  /condiciones-medicas/alergias/disponibles:
    get:
      summary: Listar alergias disponibles en el catálogo
      tags:
        - CondicionesMedicas - Pacientes
      description: |-
        Obtiene todas las alergias disponibles en el catálogo para que el paciente pueda agregarlas a su perfil.
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/condiciones-medicas/alergias/disponibles?target=en&translate_fields=nombre,descripcion`
      security:
        - bearerAuth: []
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: Idioma destino para traducción automática (activa la traducción)
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre,descripcion"
          description: Campos a traducir separados por coma
      responses:
        '200':
          description: Lista de alergias disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CondicionMedica'
        '401':
          description: No autorizado
        '403':
          description: Acceso denegado - Solo pacientes

  /condiciones-medicas/alergias/buscar:
    get:
      summary: Buscar alergias por nombre
      tags:
        - CondicionesMedicas - Pacientes
      description: Busca alergias en el catálogo por nombre para facilitar la selección
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: "polen"
          description: Término de búsqueda
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 10
          example: 10
          description: Límite de resultados
        - name: source
          in: query
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción"
        - name: translate_fields
          in: query
          schema:
            type: string
          example: "nombre,descripcion"
          description: "Campos a traducir separados por coma"
      responses:
        '200':
          description: Resultados de búsqueda
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CondicionMedica'
        '400':
          description: Parámetros inválidos
        '401':
          description: No autorizado

  /condiciones-medicas/mis-alergias:
    post:
      summary: Agregar una alergia del catálogo al perfil del paciente
      tags:
        - CondicionesMedicas - Pacientes
      description: Permite al paciente agregar una alergia existente del catálogo a su perfil médico
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - condicionId
              properties:
                condicionId:
                  type: integer
                  example: 5
                  description: ID de la alergia del catálogo
                notas:
                  type: string
                  example: "Reacción severa en primavera, necesito antihistamínicos"
                  description: Notas personales sobre la alergia (opcional)
      responses:
        '201':
          description: Alergia agregada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Alergia agregada exitosamente."
                  data:
                    type: object
                    description: Alergia del catálogo con las notas del paciente incluidas
                    properties:
                      id:
                        type: integer
                        example: 5
                      nombre:
                        type: string
                        example: "Alergia al polen"
                      descripcion:
                        type: string
                        example: "Alergia común en primavera"
                      tipo:
                        type: string
                        example: "Alergia"
                      notas:
                        type: string
                        example: "Reacción severa en primavera, necesito antihistamínicos"
                        description: Notas personales del paciente sobre esta alergia
        '400':
          description: Error de validación (alergia ya registrada, no es una alergia, etc.)
        '401':
          description: No autorizado

  /condiciones-medicas/mis-alergias/{id}:
    patch:
      summary: Actualizar notas de una alergia del paciente
      tags:
        - CondicionesMedicas - Pacientes
      description: |
        Permite al paciente actualizar las notas personales y estado de una alergia en su perfil.
        
        **¿Qué se actualiza?**
        - Las notas personales del paciente en `caracteristicas_especiales`
        - El estado de la relación paciente-alergia (Activo/Inactivo)
        
        **Importante:**
        - Solo se actualizan las notas del paciente, NO la descripción del catálogo de alergias
        - Solo funciona para alergias (tipo='Alergia'), no para condiciones personales
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 5
          description: ID de la alergia a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notas:
                  type: string
                  example: "Actualización: ahora solo me afecta en primavera, he mejorado con el tratamiento"
                  description: Nuevas notas personales sobre la alergia
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
                  description: Nuevo estado de la alergia en el perfil del paciente
      responses:
        '200':
          description: Alergia actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Alergia actualizada exitosamente."
                  data:
                    $ref: '#/components/schemas/CondicionMedica'
        '400':
          description: Error de validación (no es una alergia, no existe en tu perfil, etc.)
        '401':
          description: No autorizado

    delete:
      summary: Eliminar una alergia del perfil del paciente
      tags:
        - CondicionesMedicas - Pacientes
      description: |-
        Marca la alergia como "Eliminado" (soft delete). El registro se mantiene en el historial.
        
        **Funcionamiento:**
        - Cambia el estado a "Eliminado" en `caracteristicas_especiales`
        - El paciente puede volver a agregar la misma alergia, generando un nuevo registro activo
        - NO elimina la alergia del catálogo, solo la remueve del perfil del paciente
        - Solo funciona para alergias (tipo='Alergia'), no para condiciones personales
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 5
          description: ID de la alergia a eliminar
      responses:
        '200':
          description: Alergia eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Alergia eliminada exitosamente de tu perfil."
        '400':
          description: Error de validación (no es una alergia, no existe en tu perfil, etc.)
        '401':
          description: No autorizado


  /condiciones-medicas/mis-condiciones:
    post:
      summary: Crear una condición médica personal
      tags:
        - CondicionesMedicas - Pacientes
      description: |
        Permite al paciente crear una condición médica personalizada que no está en el catálogo.
        
        **Funcionamiento:**
        - Se crea una entrada única en `condiciones_medicas` con un nombre generado automáticamente
        - Se vincula al paciente mediante `caracteristicas_especiales`
        - La descripción proporcionada se guarda en las notas del paciente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - notas
              properties:
                notas:
                  type: string
                  example: "Tengo migrañas frecuentes los fines de semana, especialmente cuando hay mucho sol"
                  description: Descripción/notas de la condición personal
      responses:
        '201':
          description: Condición creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Condición creada exitosamente."
                  data:
                    type: object
                    description: Condición personal creada con las notas del paciente incluidas
                    properties:
                      id:
                        type: integer
                        example: 123
                      nombre:
                        type: string
                        example: "Condición Personal"
                      descripcion:
                        type: string
                        example: "Condición personal del paciente"
                      tipo:
                        type: string
                        example: "Condición"
                      notas:
                        type: string
                        example: "Tengo migrañas frecuentes los fines de semana, especialmente cuando hay mucho sol"
                        description: Notas personales del paciente sobre esta condición
        '400':
          description: Error de validación
        '401':
          description: No autorizado

    get:
      summary: Obtener condiciones médicas del paciente
      tags:
        - CondicionesMedicas - Pacientes
      description: |
        Retorna todas las condiciones médicas (alergias y condiciones personales) del paciente autenticado.
        
        **Filtros disponibles:**
        - Por tipo: `Alergia` o `Condición`
        - Por estado: `Activa` o `Inactiva`
        
        **Traducción automática:**
        - Agrega `?target=en&translate_fields=nombre,descripcion` para traducir los campos
        - Idiomas soportados: es, en, fr, de, it, pt, etc.
        - Ejemplo: `/mis-condiciones?target=en&translate_fields=nombre,descripcion`
        
        **Respuesta:**
        - Lista de condiciones con información completa de cada una
      security:
        - bearerAuth: []
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
            enum: ["Alergia", "Condición"]
          example: "Alergia"
          description: Filtrar por tipo de condición
        - name: estado
          in: query
          schema:
            type: string
            enum: ["Activa", "Inactiva"]
          example: "Activa"
          description: Filtrar por estado
        - name: source
          in: query
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción (activa la traducción)"
        - name: translate_fields
          in: query
          schema:
            type: string
          example: "nombre,descripcion"
          description: "Campos a traducir separados por coma (requerido si se usa traducción)"
      responses:
        '200':
          description: Lista de condiciones obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Condiciones obtenidas exitosamente."
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CondicionMedica'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /condiciones-medicas/mis-condiciones/{id}:
    patch:
      summary: Actualizar notas de una condición personal del paciente
      tags:
        - CondicionesMedicas - Pacientes
      description: |
        Permite al paciente actualizar las notas personales y estado de una condición personal.
        
        **¿Qué se actualiza?**
        - Las notas personales del paciente en `caracteristicas_especiales`
        - El estado de la relación paciente-condición (Activo/Inactivo)
        
        **Importante:**
        - Solo funciona para condiciones personales (tipo='Condición'), no para alergias
        - Para actualizar alergias, usa `PATCH /mis-alergias/:id`
        - Solo se actualizan las notas del paciente
        
        **Respuesta:**
        - Retorna la condición sin modificar (las notas se almacenan por separado)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
          description: ID de la condición a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notas:
                  type: string
                  example: "Actualización: las migrañas han mejorado desde que uso gafas de sol"
                  description: Nuevas notas personales sobre la condición
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
                  description: Nuevo estado de la relación paciente-condición
      responses:
        '200':
          description: Condición actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Condición actualizada exitosamente."
                  data:
                    $ref: '#/components/schemas/CondicionMedica'
        '400':
          description: Error de validación (condición no existe en tu perfil)
        '401':
          description: No autorizado

    delete:
      summary: Eliminar una condición personal del paciente
      tags:
        - CondicionesMedicas - Pacientes
      description: |-
        Marca la condición como "Eliminado" (soft delete). El registro se mantiene en el historial.
        
        **Funcionamiento:**
        - Cambia el estado a "Eliminado" en `caracteristicas_especiales`
        - El paciente puede volver a crear una condición similar, generando un nuevo registro activo
        - Solo funciona para condiciones personales (tipo='Condición'), no para alergias
        - Para eliminar alergias, usa `DELETE /mis-alergias/:id`
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
          description: ID de la condición personal a eliminar
      responses:
        '200':
          description: Condición eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Condición eliminada exitosamente de tu perfil."
        '400':
          description: Error de validación (condición no existe en tu perfil)
        '401':
          description: No autorizado

