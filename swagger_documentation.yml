            example: 1
          description: ID del barrio a eliminar
      responses:
        '200':
          description: Barrio eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Barrio'
                  message:
                    type: string
