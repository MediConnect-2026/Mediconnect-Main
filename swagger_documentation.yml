  # --- CONVERSACIONES ENDPOINTS ---
  /conversaciones:
    get:
      summary: Obtener conversaciones del usuario
      tags:
        - Conversaciones
      description: |
        Obtiene todas las conversaciones del usuario autenticado con soporte para filtros y paginación.
        
        **WebSocket:** Los cambios se notifican en tiempo real
      security:
        - bearerAuth: []
      parameters:
        - name: estado
          in: query
          required: false
          schema:
            type: string
            enum: [Activa, Archivada, Bloqueada]
        - name: silenciado
          in: query
          required: false
          schema:
            type: boolean
        - name: busqueda
          in: query
          required: false
          schema:
            type: string
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Conversaciones obtenidas exitosamente
        '401':
          description: No autenticado

    post:
      summary: Crear una nueva conversación
      tags:
        - Conversaciones
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - receptorId
              properties:
                receptorId:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Conversación creada exitosamente
        '409':
          description: Ya existe una conversación con ese usuario

  /conversaciones/obtener-o-crear:
    post:
      summary: Obtener o crear conversación
      tags:
        - Conversaciones
      description: Obtiene una conversación existente o crea una nueva si no existe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - receptorId
              properties:
                receptorId:
                  type: integer
                  example: 3
      responses:
        '200':
          description: Conversación obtenida o creada

  /conversaciones/{id}:
    get:
      summary: Obtener conversación por ID
      tags:
        - Conversaciones
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conversación obtenida exitosamente
        '403':
          description: No tienes acceso a esta conversación

    patch:
      summary: Actualizar conversación (silenciar/archivar/bloquear)
      tags:
        - Conversaciones
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
