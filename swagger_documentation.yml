  # --- BARRIOS ENDPOINTS GEOESPACIALES ---
  /barrios/geo/punto:
    get:
      summary: Buscar barrio por coordenadas
      tags:
        - Barrios
      description: >
        Dado un punto geográfico expresado como longitud y latitud (en grados decimales, SRID 4326),
        devuelve el barrio activo cuyo polígono contiene ese punto utilizando la función PostGIS `ST_Contains`.
        La respuesta incluye el polígono completo del barrio (`geom`) en formato GeoJSON, junto con
        la cadena geográfica completa (sección, distrito, municipio, provincia).
      parameters:
        - name: longitud
          in: query
          required: true
          schema:
            type: number
            format: double
            example: -69.9312
          description: "Longitud del punto (entre -180 y 180)"
        - name: latitud
          in: query
          required: true
          schema:
            type: number
            format: double
            example: 18.4861
          description: "Latitud del punto (entre -90 y 90)"
      responses:
        '200':
          description: Barrio encontrado para las coordenadas dadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Barrio'
                  message:
                    type: string
                    example: Barrio encontrado exitosamente para las coordenadas dadas
                  description:
                    type: string
                    example: "El campo data.geom contiene el polígono completo del barrio en formato GeoJSON (Polygon/MultiPolygon)"
        '400':
          description: Parámetros faltantes o inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ningún barrio contiene el punto dado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

  /barrios/geo/{id}:
    get:
      summary: Obtener geometría (polígono) de un barrio
      tags:
        - Barrios
      description: >
        Dado el ID de un barrio, devuelve todos sus datos más el campo `geom` con la geometría
        completa del polígono en formato GeoJSON (producida por `ST_AsGeoJSON`).
        Si el barrio no tiene geometría cargada, el campo `geom` será `null`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID del barrio
      responses:
        '200':
          description: Geometría del barrio obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      seccionId:
                        type: integer
                        example: 3
                      nombre:
                        type: string
                        example: Los Prados
                      estado:
                        type: string
                        example: Activo
                      creadoEn:
                        type: string
                        format: date-time
                      geom:
                        description: Geometría del barrio en formato GeoJSON (null si no tiene geometría cargada)
                        nullable: true
                        type: object
                        properties:
                          type:
                            type: string
                            example: Polygon
                          coordinates:
                            type: array
                            items:
                              type: array
                              items:
                                type: array
                                items:
                                  type: number
                  message:
                    type: string
                    example: Geometría del barrio obtenida exitosamente
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Barrio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

  /ubicaciones:
    post:
      summary: Crear una nueva Ubicacion
      tags:
        - Ubicaciones
      description: Crea una nueva ubicación asociada a un barrio. El punto geográfico es **obligatorio**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - barrioId
                - direccion
                - puntoGeografico
              properties:
                barrioId:
                  type: integer
                  example: 1
                  description: ID del barrio
                direccion:
                  type: string
                  example: "Calle Principal 123"
                  description: Dirección de la ubicación
                codigoPostal:
                  type: string
                  nullable: true
                  example: "28001"
                  description: Código postal (opcional, máximo 10 caracteres)
                puntoGeografico:
                  type: object
                  description: Coordenadas geográficas en formato GeoJSON Point (**obligatorio**)
                  required:
                    - type
                    - coordinates
                  properties:
                    type:
                      type: string
                      enum: [Point]
                      example: Point
                    coordinates:
                      type: array
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                      example: [-70.1234, 18.5678]
                      description: "[longitud, latitud]"
      responses:
        '201':
          description: Ubicación creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ubicacion'
        '400':
          description: Error en los parámetros de entrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    get:
      summary: Listar todas las ubicaciones
      tags:
        - Ubicaciones
      description: |
        Obtiene una lista de todas las ubicaciones activas.

        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/ubicaciones?target=en&translate_fields=nombre,direccion`
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre,direccion"
          description: 'Campos a traducir separados por comas. Campos disponibles: `nombre`, `direccion`'
      responses:
        '200':
          description: Ubicaciones obtenidas exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ubicacion'
        '500':
          description: Error interno del servidor

