      description: Actualiza un tipo de seguro existente
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                descripcion:
                  type: string
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
      responses:
        '200':
          description: Tipo de seguro actualizado exitosamente
        '404':
          description: Tipo de seguro no encontrado
        '409':
          description: El nombre ya existe

    delete:
      tags:
        - TiposSeguros
      summary: Eliminar tipo de seguro (Admin)
      description: |-
        Realiza un soft delete del tipo de seguro (marca como "Eliminado").
        
        **Validación:** No se puede eliminar si está siendo usado por pacientes o doctores activos.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tipo de seguro eliminado exitosamente
        '404':
          description: Tipo de seguro no encontrado
        '409':
          description: No se puede eliminar - tipo de seguro en uso

