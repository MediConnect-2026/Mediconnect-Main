                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
                  description: Estado de la relación (opcional, por defecto Activo)
      responses:
        '201':
          description: Relación ServicioHorario creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
