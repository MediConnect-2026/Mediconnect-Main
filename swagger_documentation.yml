  /resenas:
    post:
      summary: Crear una reseña
      tags:
        - Reseñas
      description: |
        El paciente autenticado crea una calificación (1-5 estrellas) y un comentario opcional
        para un servicio médico. Reglas de negocio:
        - Un paciente solo puede calificar un servicio **una vez**.
        - Si se pasa `citaId`, la cita debe estar en estado `Completada` y pertenecer al paciente.
        - Tras crear la reseña se recalculan automáticamente `calificacionPromedio` del servicio y del doctor.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - servicioId
                - calificacion
              properties:
                servicioId:
                  type: integer
                  example: 5
                  description: ID del servicio a calificar.
                calificacion:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
                  description: Calificación del 1 al 5.
                comentario:
                  type: string
                  example: "Excelente atención, muy profesional."
                  description: Comentario opcional.
                citaId:
                  type: integer
                  example: 12
                  description: ID de la cita que originó la reseña (opcional).
      responses:
        '201':
          description: Reseña creada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Resena'
                  message:
                    type: string
                    example: Reseña creada exitosamente.
        '400':
          description: Datos inválidos, calificación fuera de rango o reseña duplicada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado (solo Pacientes).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Servicio o cita no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El paciente ya calificó este servicio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

