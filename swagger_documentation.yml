  /citas/calendario:
    get:
      summary: Vista de calendario de citas
      tags:
        - Citas
      security:
        - bearerAuth: []
      description: |
        Retorna las citas del usuario autenticado (**Paciente** o **Doctor**) agrupadas por fecha,
        para un rango de tiempo determinado por el parámetro `vista`.

        | `vista`   | Rango cubierto |
        |-----------|---------------|
        | `hoy`     | Solo el día de `fecha` (o hoy si se omite) |
        | `dia`     | Igual que `hoy` — útil para pasar una fecha cualquiera |
        | `semana`  | Lunes–Domingo de la semana que contiene `fecha` |
        | `mes`     | 1er día al último día del mes que contiene `fecha` |

        Si se omite `fecha` se usa la fecha actual del servidor.
      parameters:
        - name: vista
          in: query
          required: false
          schema:
            type: string
            enum: [hoy, dia, semana, mes]
            default: hoy
          description: "Rango de tiempo a mostrar"
        - name: fecha
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-03-08"
          description: "Fecha de referencia en formato YYYY-MM-DD (default: hoy)"
      responses:
        '200':
          description: Calendario de citas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  vista:
                    type: string
                    example: "semana"
                  fechaReferencia:
                    type: string
                    format: date
                    example: "2026-03-08"
                  rango:
                    type: object
                    properties:
                      desde:
                        type: string
                        format: date
                        example: "2026-03-02"
                      hasta:
                        type: string
                        format: date
                        example: "2026-03-08"
                  total:
                    type: integer
                    description: Total de citas en el rango
                    example: 5
                  dias:
                    type: array
                    description: Citas agrupadas por fecha, ordenadas cronológicamente
                    items:
                      type: object
                      properties:
                        fecha:
                          type: string
                          format: date
                          example: "2026-03-04"
                        total:
                          type: integer
                          example: 2
                        citas:
                          type: array
                          items:
                            $ref: '#/components/schemas/Cita'
        '400':
          description: Parámetros inválidos (vista no reconocida, formato de fecha incorrecto)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Paciente o Doctor)

