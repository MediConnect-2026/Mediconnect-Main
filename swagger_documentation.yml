  # --- MEDIA ENDPOINTS ---
  /media/tipos-permitidos:
    get:
      summary: Obtener tipos de archivos permitidos
      tags:
        - Media
      description: Devuelve los tipos MIME aceptados agrupados por categoría (imagen, audio, video, documento).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tipos MIME permitidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      IMAGE:
                        type: array
                        items:
                          type: string
                        example: ["image/jpeg", "image/png", "image/gif", "image/webp"]
                      AUDIO:
                        type: array
                        items:
                          type: string
                        example: ["audio/mpeg", "audio/wav", "audio/ogg"]
                      VIDEO:
                        type: array
                        items:
                          type: string
                        example: ["video/mp4", "video/webm"]
                      FILE:
                        type: array
                        items:
                          type: string
                        example: ["application/pdf", "application/zip"]
        '401':
          description: No autenticado

  /media:
    get:
      summary: Listar archivos multimedia
      tags:
        - Media
      description: |
        Lista todos los archivos activos. Soporta filtrado por tipo de archivo
        y paginación mediante `limite` y `offset`.
      security:
        - bearerAuth: []
      parameters:
        - name: tipo
          in: query
          required: false
          schema:
            type: string
            enum: ["image", "audio", "video", "file"]
          description: Categoría de archivo a filtrar
          example: image
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Cantidad máxima de resultados
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Número de registros a omitir (paginación)
      responses:
        '200':
          description: Lista de archivos obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    example: 3
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Media'
        '401':
          description: No autenticado

    post:
      summary: Subir un archivo multimedia
      tags:
        - Media
      description: |
        Sube un archivo al storage y lo registra en la base de datos.

        **Tipos aceptados:** imagen (jpeg, png, gif, webp), audio (mp3, wav, ogg, webm),
        video (mp4, webm, ogg), documentos (pdf, docx, xlsx, txt, zip).

        **Límite de tamaño:** 50 MB.

        El campo `archivo` debe enviarse como `multipart/form-data`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archivo
              properties:
                archivo:
                  type: string
                  format: binary
                  description: Archivo a subir (imagen, audio, video, PDF, Word, Excel, ZIP, etc.)
      responses:
        '201':
          description: Archivo subido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Archivo subido exitosamente"
                  data:
                    $ref: '#/components/schemas/Media'
        '400':
          description: |
            Error de validación. Posibles causas:
            - Tipo de archivo no permitido
            - Archivo mayor a 50 MB
            - No se proporcionó archivo
        '401':
          description: No autenticado

  /media/{id}:
    get:
