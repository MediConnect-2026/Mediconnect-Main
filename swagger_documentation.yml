      description: |
        Permite al **Doctor** registrar el diagnóstico de la consulta y marca la cita como **Completada**.
        - Disponible para citas en estado `Programada`, `En Progreso` o `Reprogramada`.
        - Crea o actualiza el `HistorialConsulta` asociado a la cita.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resumen
                - diagnostico
              properties:
                resumen:
                  type: string
                  example: "Paciente acude por dolor de cabeza persistente de 3 días de evolución."
                diagnostico:
                  type: string
                  example: "Migraña tensional"
                tratamiento:
                  type: string
                  example: "Ibuprofeno 400mg cada 8h por 5 días, reposo relativo"
                observacion:
                  type: string
                  example: "Regresar si el dolor persiste más de 7 días"
      responses:
        '200':
          description: Diagnóstico registrado y cita marcada como Completada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/HistorialConsulta'
                  message:
                    type: string
                    example: "Diagnóstico registrado. Cita marcada como Completada."
        '400':
          description: Estado de cita inválido para diagnosticar o campos requeridos faltantes
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor y ser el doctor de la cita)
        '404':
