        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "comentarios"
          description: "Campos a traducir separados por coma"
      responses:
        '200':
          description: Estado de documentos obtenido exitosamente
          content:
