                  example: "+1-809-555-5678"
                biografia:
                  type: string
                  example: "Médico especialista con 10 años de experiencia"
                anosExperiencia:
                  type: integer
                  example: 10
                tarifas:
                  type: number
                  example: 1500.00
                duracionCitaPromedio:
                  type: integer
                  example: 30
                nacionalidad:
                  type: string
                  example: "Dominicana"
                fechaNacimiento:
                  type: string
                  format: date
                  example: "1985-06-20"
                  description: "Fecha de nacimiento del doctor (formato ISO 8601: YYYY-MM-DD)"
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
      responses:
        '200':
          description: Perfil actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Perfil actualizado exitosamente."
                  data:
                    $ref: '#/components/schemas/Doctor'
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: Doctor no encontrado
        '409':
          description: Exequatur o documento ya existe
        '500':
          description: Error interno del servidor

  /doctores/cercanos:
    get:
      summary: Buscar doctores cercanos (geolocalización)
      tags:
        - Doctores
      description: |
        Retorna doctores **activos** y **verificados** (`estadoVerificacion = Aprobado`) que tienen
        al menos una ubicación con coordenadas geográficas dentro del radio indicado.

        Los resultados se ordenan de **menor a mayor distancia**.

        Solo se retornan doctores que han registrado al menos una ubicación con `punto_geografico`.

        **Filtros opcionales:** `especialidadId`, `genero`, `calificacionMin`

        **Traducción Automática:** soportada vía `target` + `translate_fields`

        **Acceso:** Paciente, Doctor, Admin autenticado.
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitud del punto de referencia (-90 a 90)
          example: 18.4861
        - name: lng
          in: query
          required: true
          schema:
            type: number
          description: Longitud del punto de referencia (-180 a 180)
          example: -69.9312
        - name: radio
          in: query
          required: false
          schema:
            type: number
            default: 5
            minimum: 0
            maximum: 15
          description: Radio de búsqueda en kilómetros (0–15). Por defecto 5 km
          example: 5
        - name: especialidadId
          in: query
          required: false
          schema:
            type: integer
          description: Filtrar por ID de especialidad
          example: 3
        - name: genero
          in: query
          required: false
          schema:
            type: string
            enum: [M, F]
          description: Filtrar por género del doctor
          example: M
        - name: calificacionMin
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 5
          description: Calificación promedio mínima (0–5)
          example: 4
        - name: target
          in: query
          required: false
          schema:
            type: string
          description: Idioma destino para traducción automática
          example: "en"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          description: Idioma origen para traducción
          example: "es"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          description: Campos a traducir separados por coma
          example: "biografia,nombre"
      responses:
        '200':
          description: Lista de doctores cercanos ordenados por distancia
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Número de doctores encontrados
                    example: 3
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        usuarioId:
                          type: integer
                          example: 6
                        nombre:
                          type: string
                          example: "Juan"
                        apellido:
                          type: string
                          example: "Aramboles"
                        calificacionPromedio:
                          type: number
                          nullable: true
                          example: 4.5
                        distanciaMetros:
                          type: integer
                          description: Distancia en metros desde el punto de referencia
                          example: 1200
                        especialidades:
                          type: array
                          items:
                            type: object
                        ubicaciones:
                          type: array
                          items:
                            type: object
                        servicios:
                          type: array
                          items:
                            type: object
                        segurosAceptados:
                          type: array
                          items:
                            type: object
                        usuario:
                          type: object
                          properties:
                            email:
                              type: string
                            telefono:
                              type: string
                              nullable: true
                            fotoPerfil:
                              type: string
                              nullable: true
        '400':
          description: Parámetros lat, lng o radio inválidos
        '401':
          description: No autenticado

  /doctores/comparar:

    post:
      summary: Comparar hasta 4 doctores
      tags:
        - Doctores
      description: |
        Permite a un paciente seleccionar entre **1 y 4 doctores** y obtener sus perfiles completos
        para comparar sus especialidades, seguros aceptados, servicios, horarios, idiomas,
        formaciones académicas y experiencias laborales.

        - Solo devuelve doctores con `estado: Activo` y `estadoVerificacion: Aprobado`.
        - Los datos sensibles (documentos internos, comentarios de verificación) no se incluyen.
        - Si un ID no corresponde a un doctor activo/verificado, simplemente no aparece en la respuesta.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  minItems: 1
                  maxItems: 4
                  example: [1, 3, 7]
                  description: Arreglo de IDs de los doctores a comparar (mínimo 1, máximo 4)
      responses:
        '200':
          description: Comparación obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Cantidad de doctores encontrados
                    example: 2
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        usuarioId:
                          type: integer
                          example: 1
                        nombre:
                          type: string
                          example: "María"
                        apellido:
                          type: string
                          example: "González"
                        biografia:
                          type: string
                          nullable: true
                        anosExperiencia:
                          type: integer
                          nullable: true
                        calificacionPromedio:
                          type: number
                          example: 4.8
                        tarifas:
                          type: number
                          nullable: true
                        duracionCitaPromedio:
                          type: integer
                          example: 30
                        usuario:
                          type: object
                          properties:
                            email:
                              type: string
                            telefono:
                              type: string
                              nullable: true
                            fotoPerfil:
                              type: string
                              nullable: true
                        especialidades:
                          type: array
                          items:
                            type: object
                            properties:
                              es_principal:
                                type: boolean
                              especialidades:
                                type: object
                                properties:
                                  nombre:
                                    type: string
                        segurosAceptados:
                          type: array
                          items:
                            type: object
                            properties:
                              seguro:
                                type: object
                                properties:
                                  nombre:
                                    type: string
                                  urlImage:
                                    type: string
                                    nullable: true
                              tipoSeguro:
                                type: object
                                properties:
                                  nombre:
                                    type: string
                        servicios:
                          type: array
                          items:
                            $ref: '#/components/schemas/Servicio'
                        horarios:
                          type: array
                          items:
                            $ref: '#/components/schemas/Horario'
                        idiomas:
                          type: array
                          items:
                            type: object
                            properties:
                              nombre:
                                type: string
                              nivel:
                                type: string
                                nullable: true
                        formaciones:
                          type: array
                          items:
                            type: object
                        experiencias:
                          type: array
                          items:
                            type: object
        '400':
          description: |
            Solicitud inválida. Posibles causas:
            - `ids` no es un arreglo
            - `ids` está vacío
            - Se pasan más de 4 IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Paciente)
        '500':
          description: Error interno del servidor

  /doctores/{id}:
    get:
      summary: Obtener doctor por ID
      tags:
        - Doctores
      description: |
        Obtiene un doctor específico por su ID.

        **Roles permitidos:**
        - `Admin` / `Doctor`: recibe datos básicos del doctor.
        - `Paciente`: recibe el perfil completo público del doctor (especialidades, seguros, servicios, horarios, idiomas, formaciones, experiencias).
          Los documentos internos y datos de verificación no se incluyen.
          Incluye la propiedad **`isFavorite`** (`true` / `false`) que indica si este doctor está en la lista de favoritos del paciente autenticado.

        **Traducción automática:** Agrega `?target=en&translate_fields=biografia,especialidades.nombre,ubicaciones.nombre,idiomas.nombre` para traducir campos del perfil.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "biografia,especialidades.nombre,ubicaciones.nombre,idiomas.nombre"
          description: "Campos a traducir separados por coma. Soporta dot-notation para arrays anidados"
      responses:
        '200':
          description: Doctor obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Doctor'
                      - type: object
                        properties:
                          isFavorite:
                            type: boolean
                            nullable: true
                            description: >
                              Solo presente cuando el solicitante tiene el rol **Paciente**.
                              `true` si el doctor está en la lista de favoritos del paciente; `false` en caso contrario.
                            example: true
        '400':
          description: ID inválido
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Admin, Doctor o Paciente)
        '404':
          description: Doctor no encontrado
        '500':
          description: Error interno del servidor


    patch:
      summary: Actualizar doctor por ID
      tags:
        - Doctores
      description: Actualiza un doctor específico. Solo accesible por administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                apellido:
                  type: string
                biografia:
                  type: string
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
      responses:
        '200':
          description: Doctor actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Doctor'
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Admin)
        '404':
          description: Doctor no encontrado
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar doctor (lógico)
      tags:
        - Doctores
      description: Realiza una eliminación lógica del doctor. Solo accesible por administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Doctor eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Doctor eliminado exitosamente."
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Admin)
        '404':
          description: Doctor no encontrado
        '500':
          description: Error interno del servidor

  /doctores/mis-documentos:
    get:
      summary: Obtener estado de documentos del doctor autenticado
      tags:
