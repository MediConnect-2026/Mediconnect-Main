              properties:
                nombre:
                  type: string
                urlImage:
                  type: string
                estado:
                  type: string
                  enum: [Activo, Inactivo]
      responses:
        '200':
          description: Seguro actualizado exitosamente

    delete:
      tags:
        - Seguros
      summary: Eliminar seguro (Admin)
      description: Desactiva un seguro médico
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Seguro eliminado exitosamente

  /seguros/disponibles:
    get:
      tags:
        - Seguros
      summary: Ver seguros disponibles
      description: |-
        Obtiene todos los seguros activos (disponible para Pacientes y Doctores)
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/seguros/disponibles?target=en&translate_fields=nombre`
      security:
        - bearerAuth: []
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          description: "Código de idioma ISO 639-1 para traducir los resultados (ej: 'en', 'es', 'fr')"
          example: "en"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          description: "Campos a traducir separados por comas (ej: 'nombre')"
          example: "nombre"
      responses:
        '200':
          description: Seguros disponibles obtenidos exitosamente

  /seguros/mas-utilizados:
    get:
      tags:
        - Seguros
      summary: Seguros más utilizados por pacientes
      description: |-
        Devuelve el ranking de los seguros médicos más utilizados por pacientes activos,
        ordenados de mayor a menor número de pacientes. Útil para que doctores y administradores
        conozcan cuáles son los seguros con mayor demanda.

        **Acceso:** Cualquier usuario autenticado (Paciente, Doctor, Administrador)
      security:
        - bearerAuth: []
      parameters:
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          description: "Número máximo de seguros a retornar (default: 10, max: 50)"
          example: 10
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre"
          description: "Campos a traducir separados por comas. Campo disponible: `nombre`"
      responses:
        '200':
          description: Ranking obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: "Seguros más utilizados obtenidos exitosamente"
                  total:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 3
                        nombre:
                          type: string
                          example: "ARS Humano"
                        urlImage:
                          type: string
                          nullable: true
                          example: "https://example.com/logo.png"
                        estado:
                          type: string
                          example: "Activo"
                        totalPacientes:
                          type: integer
                          description: Número de pacientes activos con este seguro
                          example: 42
        '400':
          description: Parámetro 'limite' inválido
        '401':
          description: No autenticado

