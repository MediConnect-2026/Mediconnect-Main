  # ─── SERVICIOS ─────────────────────────────────────────────────────────────
  /servicios/cercanos:
    get:
      summary: Buscar servicios por cercanía geográfica
      tags:
        - Servicios
      description: |
        Retorna todos los servicios activos cuyas ubicaciones se encuentren dentro de un radio (0–15 km) de las coordenadas proporcionadas.

        - Resultados ordenados de **más cercano a más lejano**.
        - Cada servicio incluye el campo `distanciaMetros` con la distancia al punto de referencia.
        - Usa PostGIS (`ST_DWithin` + `ST_Distance`) para eficiencia máxima con soporte de índice GIST.

        **Traducción automática:** Agrega `?target=en&translate_fields=nombre,descripcion` para traducir campos.

        **Ejemplo:**
        ```
        GET /api/servicios/cercanos?lat=18.4861&lng=-69.9312&radio=10
        ```
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
          example: 18.4861
          description: Latitud del punto de referencia (WGS84)
        - name: lng
          in: query
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
          example: -69.9312
          description: Longitud del punto de referencia (WGS84)
        - name: radio
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 15
            default: 5
          example: 10
          description: Radio de búsqueda en kilómetros (0–15 km, default 5 km)
        - name: especialidadId
          in: query
          required: false
          schema:
            type: integer
          example: 3
          description: Filtrar por ID de especialidad
        - name: modalidad
          in: query
          required: false
          schema:
            type: string
            enum: ["Presencial", "Teleconsulta", "Mixta"]
          example: "Presencial"
          description: Filtrar por modalidad del servicio
        - name: precioMin
          in: query
          required: false
          schema:
            type: number
          example: 500
          description: Precio mínimo del servicio (RD$)
        - name: precioMax
          in: query
          required: false
          schema:
            type: number
          example: 3000
          description: Precio máximo del servicio (RD$)
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre,descripcion"
          description: "Campos a traducir separados por coma"
      responses:
        '200':
          description: Lista de servicios cercanos obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Cantidad de servicios encontrados en el radio
                    example: 4
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Servicio'
                        - type: object
                          properties:
                            distanciaMetros:
                              type: integer
                              description: Distancia en metros desde el punto de referencia
                              example: 1250
                            doctorEsFavorito:
                              type: boolean
                              description: |
                                Indica si el doctor que ofrece este servicio está marcado como favorito
                                por el paciente autenticado. Siempre `false` para usuarios no-Paciente.
                              example: true
        '400':
          description: |
            Parámetros inválidos. Posibles causas:
            - `lat` o `lng` ausentes o no numéricos
            - `radio` fuera del rango permitido (0–15)
        '401':
          description: No autenticado
        '403':
          description: No autorizado

  /servicios:
    post:
      summary: Crear un nuevo servicio médico
      tags:
        - Servicios
      description: |
        Crea un nuevo servicio médico para el doctor autenticado.
        Acepta `multipart/form-data` para subir imágenes opcionales (máx. 10, 5MB c/u).

        **Centros y horarios:**
        Envía `centroSaludIds` y/o `ubicacionIds` como arrays de IDs de centros/ubicaciones.
        Envía `horarioIds` con los IDs de horarios ya creados por el doctor (vía `POST /horarios`).
        El sistema valida que los horarios pertenezcan al doctor y estén activos.

        **Acceso:** Doctor
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - especialidadId
                - nombre
                - precio
                - duracionMinutos
                - modalidad
              properties:
                especialidadId:
                  type: integer
                  example: 3
                  description: ID de la especialidad medica del servicio
                nombre:
                  type: string
                  example: "Consulta General"
                  description: Nombre del servicio
                descripcion:
                  type: string
                  example: "Consulta medica general de 30 minutos"
                  description: Descripcion detallada del servicio
                precio:
                  type: number
                  format: float
                  example: 1500
                  description: Precio del servicio
                duracionMinutos:
                  type: integer
                  example: 30
                  description: Duracion del servicio en minutos
                sesiones:
                  type: integer
                  example: 1
                  description: "Numero de slots que ocupa el servicio. Ej: si duracionMinutos=30 y sesiones=2, el servicio dura 1h."
                maxPacientesDia:
                  type: integer
                  example: 20
                modalidad:
                  type: string
                  enum: [Presencial, Teleconsulta, Mixta]
                  example: "Presencial"
                  description: Modalidad de atención del servicio
                centroSaludIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
                  description: IDs de centros de salud donde se ofrecerá el servicio
                ubicacionIds:
                  type: array
                  items:
                    type: integer
                  example: [5]
                  description: IDs de ubicaciones propias del doctor
                horarioIds:
                  type: array
                  items:
                    type: integer
                  example: [3, 7]
                  description: |
                    IDs de horarios ya creados por el doctor (vía `POST /horarios`).
                    Estos horarios quedarán vinculados al servicio.
                    El sistema verifica que cada ID pertenezca al doctor y esté Activo.
                imagenes:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "Imágenes del servicio (JPEG, PNG, WebP — máx. 10 archivos, 5MB c/u)"
      responses:
        '201':
          description: Servicio creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ServicioDetalle'
                  message:
                    type: string
                    example: "Servicio creado exitosamente"
        '400':
          description: Datos inválidos o imagen no permitida
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

  /servicios/{id}/slots:
    get:
      summary: Consultar slots disponibles de un servicio en una fecha
      tags:
        - Servicios
        - Citas
      description: |
        Retorna la lista de **franjas horarias (slots)** disponibles de un servicio para una fecha concreta.

        El sistema genera automáticamente los slots a partir del horario del servicio (`horaInicio–horaFin`)
        con una duración de `duracionMinutos` por slot, y marca cada uno como `disponible: true/false`
        según si el doctor ya tiene una cita u otro evento programado en ese rango.

        **Usa este endpoint antes de `POST /citas`** para mostrar al paciente qué horas están libres.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del servicio
          schema:
            type: integer
          example: 1
        - name: fecha
          in: query
          required: true
          description: Fecha en formato YYYY-MM-DD
          schema:
            type: string
          example: "2026-03-10"
      responses:
        '200':
          description: Lista de slots del servicio para la fecha solicitada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  fecha:
                    type: string
                    example: "2026-03-10"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        horarioId:
                          type: integer
                          example: 2
                        horarioNombre:
                          type: string
                          nullable: true
                          example: "Turno Mañana"
                        horaInicio:
                          type: string
                          format: date-time
                          example: "2026-03-10T09:00:00.000Z"
                        horaFin:
                          type: string
                          format: date-time
                          example: "2026-03-10T09:30:00.000Z"
                        disponible:
                          type: boolean
                          description: true si el doctor está libre en esa franja, false si ya tiene una cita u otro evento
                          example: true
        '400':
          description: ID de servicio inválido o parámetro fecha faltante/incorrecto
        '401':
          description: No autenticado
        '404':
          description: Servicio no encontrado

  /servicios/{id}/slots-disponibles:
    get:
      summary: Slots disponibles de un servicio (solo los libres)
      tags:
        - Servicios
        - Citas
      description: |
        Devuelve **únicamente los horarios disponibles** de un servicio para una fecha dada,
        listos para mostrar como botones/pills en la UI (ej: `10:00 a.m.`, `10:30 a.m.`, …).

        A diferencia de `GET /servicios/{id}/slots` que devuelve todos los slots con
        `disponible: true/false`, este endpoint solo retorna los que están libres.

        - Divide el rango `horaInicio–horaFin` del horario en franjas de `duracionMinutos`.
        - Excluye slots con conflicto de citas o periodo de inactividad del doctor.
        - Incluye la hora formateada en 12h para uso directo en el frontend.

        **Traducción Automática:** Agrega `?target=en&translate_fields=horarioNombre` para traducir nombres del horario.

        **Acceso:** Paciente, Doctor, Administrador
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del servicio
          schema:
            type: integer
          example: 1
        - name: fecha
          in: query
          required: true
          description: Fecha en formato YYYY-MM-DD
          schema:
            type: string
          example: "2026-03-10"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: Idioma destino para traducción automática
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "horarioNombre"
          description: Campos a traducir separados por coma
      responses:
        '200':
          description: Lista de slots disponibles obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  servicioId:
                    type: integer
                    example: 1
                  fecha:
                    type: string
                    example: "2026-03-10"
                  total:
                    type: integer
                    description: Cantidad de slots disponibles
                    example: 12
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        horaInicio:
                          type: string
                          description: Hora de inicio en formato HH:MM UTC (24h)
                          example: "10:00"
                        horaFin:
                          type: string
                          description: Hora de fin en formato HH:MM UTC (24h)
                          example: "10:30"
                        horaInicioFormateada:
                          type: string
                          description: Hora de inicio en formato 12h para la UI
                          example: "10:00 a.m."
                        horarioId:
                          type: integer
                          example: 2
                        horarioNombre:
                          type: string
                          nullable: true
                          example: "Turno Mañana"
        '400':
          description: ID inválido o fecha faltante/incorrecta
        '401':
          description: No autenticado
        '404':
          description: Servicio no encontrado o inactivo

  /servicios/doctor/{doctorId}/disponibilidad:
    get:
      summary: Disponibilidad del doctor por días
      tags:
        - Servicios
        - Citas
      description: |
        Retorna un **resumen de disponibilidad día a día** para todos los servicios activos
        de un doctor. Por cada día informa si hay al menos un slot libre y cuántos slots
        libres hay en total (sumando todos sus servicios y horarios).

        Ideal para mostrar un selector tipo calendario como:
        ```
        Mar Oct 28  |  Mié Oct 29  |  Jue Oct 30  |  ...
        Sin citas   |  Sin citas   |  2 disponibles
        ```

        - Tiene en cuenta citas ya programadas y periodos de inactividad del doctor.
        - Una sola query de citas y una de inactividad para todo el rango (sin N+1).

        **Acceso:** Paciente, Doctor, Administrador
      security:
        - bearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          description: ID del doctor (usuarioId)
          schema:
            type: integer
          example: 12
        - name: dias
          in: query
          required: false
          description: Cuántos días mostrar desde `fechaInicio` (1–30, default 7)
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
          example: 5
        - name: fechaInicio
          in: query
          required: false
          description: Día de inicio en formato YYYY-MM-DD (default hoy UTC)
          schema:
            type: string
          example: "2026-03-04"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: Idioma destino para traducción automática
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "diaSemana,mes"
          description: Campos a traducir separados por coma
      responses:
        '200':
          description: Resumen de disponibilidad por día obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  doctorId:
                    type: integer
                    example: 12
                  dias:
                    type: integer
                    example: 7
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        fecha:
                          type: string
                          description: Fecha en formato YYYY-MM-DD
                          example: "2026-03-04"
                        diaSemana:
                          type: string
                          description: Abreviatura del día en español
                          example: "Mar"
                        mes:
                          type: string
                          description: Abreviatura del mes en español
                          example: "Mar"
                        hayDisponibilidad:
                          type: boolean
                          description: true si hay al menos un slot libre ese día
                          example: true
                        totalSlotsLibres:
                          type: integer
                          description: Slots libres sumando todos los servicios del doctor
                          example: 4
        '400':
          description: Parámetros inválidos (doctorId, dias o fechaInicio incorrectos)
        '401':
          description: No autenticado
        '404':
          description: Doctor no encontrado

