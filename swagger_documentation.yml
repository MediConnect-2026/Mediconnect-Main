        **Traducción Automática:**
        Ejemplo: `/api/ubicaciones/mis-ubicaciones?target=en&translate_fields=nombre,direccion`
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre,direccion"
