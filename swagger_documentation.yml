          description: Búsqueda completada

  /mensajes/{id}:
    patch:
      summary: Editar un mensaje
      tags:
        - Mensajes
      description: Solo el remitente puede editar. Solo mensajes de texto
      security:
        - bearerAuth: []
      parameters:
        - name: id
