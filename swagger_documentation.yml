          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: El usuario no tiene el rol requerido (Doctor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    post:
      summary: Crear ubicación para el doctor autenticado
      tags:
        - Ubicaciones
      security:
        - bearerAuth: []
      description: |
        Crea una nueva ubicación en la tabla `ubicaciones` y la asigna automáticamente
        como la **ubicación principal** del doctor autenticado (`doctores.id_ubicacion`).

        **Acceso:** Requiere token JWT con rol `Doctor`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - barrioId
                - direccion
                - puntoGeografico
              properties:
                barrioId:
                  type: integer
                  example: 1
                  description: ID del barrio donde se ubica
                direccion:
                  type: string
                  example: "Av. Independencia 456, Piso 3"
                  description: Dirección completa de la ubicación
                nombre:
                  type: string
                  nullable: true
                  example: "Consultorio Principal"
                  description: Nombre descriptivo de la ubicación (opcional, máximo 120 caracteres)
                codigoPostal:
                  type: string
                  nullable: true
                  example: "10101"
                  description: Código postal (opcional, máximo 10 caracteres)
                puntoGeografico:
                  type: object
                  description: Coordenadas geográficas en formato GeoJSON Point (**obligatorio**)
                  required:
                    - type
                    - coordinates
                  properties:
                    type:
                      type: string
                      enum: [Point]
                      example: Point
                    coordinates:
                      type: array
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                      example: [-69.9012, 18.4861]
                      description: "[longitud, latitud]"
      responses:
        '201':
          description: Ubicación creada y asignada al doctor exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Ubicacion'
                  message:
                    type: string
                    example: "Ubicación creada y asignada al doctor exitosamente"
        '400':
          description: Datos inválidos o campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token JWT no proporcionado o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: El usuario no tiene el rol requerido (Doctor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

