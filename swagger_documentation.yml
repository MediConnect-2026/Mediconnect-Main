  # --- CENTROS SALUD ENDPOINTS ---
  /centros-salud/completar-perfil:
    post:
      summary: Completar perfil de centro de salud
      tags:
        - CentrosSalud
      description: |
        Completa el perfil de un centro de salud registrado con todos los datos requeridos.
        
        **Requisitos:**
        - Autenticación JWT requerida (Usuario debe ser Centro de Salud)
        - Archivos requeridos: certificadoSanitario (PDF)
        - Archivos opcionales: fotoPerfil (JPG/PNG)
        
        **Proceso:**
        1. Sube el certificado sanitario a Supabase (secure-documents)
        2. Sube la foto de perfil si se proporciona (public-assets)
        3. Crea/actualiza la ubicación del centro
        4. Actualiza datos del centro de salud
        5. Crea una acción de revisión para administrador
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - password
                - nombreComercial
                - telefono
                - tipoCentroId
                - direccion
                - barrioId
                - certificadoSanitario
              properties:
                password:
                  type: string
                  description: Contraseña para la cuenta del centro de salud (8-100 caracteres, requerida)
                  example: "ContrasenaSegura123!"
                nombreComercial:
                  type: string
                  description: Nombre comercial del centro de salud (3-120 caracteres)
                  example: "Clínica del Centro"
                rnc:
                  type: string
                  description: RNC del centro de salud (opcional, 7-20 caracteres)
                  example: "4-12345-6"
                telefono:
                  type: string
                  description: Teléfono de contacto (10-20 caracteres)
                  example: "+1-809-123-4567"
                sitioWeb:
                  type: string
                  description: Sitio web del centro (opcional)
                tipoCentroId:
                  type: number
                  description: ID del tipo de centro de salud
                  example: 1
                direccion:
                  type: string
                  description: Dirección del centro (5-255 caracteres)
                  example: "Calle Principal 123"
                barrioId:
                  type: number
                  description: ID del barrio
                  example: 5
                codigoPostal:
                  type: string
                  description: Código postal (opcional)
                certificadoSanitario:
                  type: string
                  format: binary
                  description: Certificado sanitario en PDF (requerido)
                fotoPerfil:
                  type: string
                  format: binary
                  description: Foto de perfil del centro (opcional)
      responses:
        '200':
          description: Perfil completado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: number
                      nombreComercial:
                        type: string
                      estado:
                        type: string
                      estadoVerificacion:
                        type: string
                      message:
                        type: string
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

