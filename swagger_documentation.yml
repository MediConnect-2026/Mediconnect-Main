  /doctores/documentos/{id}:
    put:
      summary: Actualizar un documento rechazado
      tags:
        - Doctores
      description: |
        Permite a un doctor actualizar un documento que fue rechazado por un administrador.
        
        **Requisitos:**
        - El doctor debe estar en estado "En revisión"
        - El documento debe estar en estado "Rechazado"
        - Se debe enviar un nuevo archivo
        
        **Proceso:**
        1. Se sube el nuevo archivo a Supabase
        2. Se actualiza el documento con el nuevo archivo
        3. El estado del documento cambia a "Pendiente"
        4. Se crea automáticamente una nueva acción de revisión
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del documento a actualizar
          schema:
            type: integer
          example: 123
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archivo
              properties:
                archivo:
                  type: string
                  format: binary
                  description: Nuevo archivo del documento (JPG, PNG, WebP o PDF, máx 5MB)
                descripcion:
                  type: string
                  description: Descripción opcional del documento actualizado
                  example: "Título académico actualizado con sello oficial"
      responses:
        '200':
          description: Documento actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Documento actualizado exitosamente. Se ha creado una nueva acción de revisión."
        '400':
          description: Solicitud inválida (archivo faltante, documento no rechazado, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "El documento no está en estado rechazado"
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor o doctor no en revisión)
        '404':
          description: Documento no encontrado
        '500':
          description: Error interno del servidor

  /doctores/certificaciones:
    post:
      summary: Agregar una nueva certificación
      tags:
        - Doctores
      description: |
        Permite a un doctor agregar una nueva certificación en cualquier momento.
        
        **Disponible para:**
        - Doctores en estado "En revisión"
        - Doctores en estado "Aprobado"
        
        **Proceso:**
        1. Se sube el archivo de certificación a Supabase
        2. Se crea un nuevo documento tipo "Certificación"
        3. Se crea automáticamente una acción de revisión
        4. Se notifica a los administradores
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archivo
                - descripcion
              properties:
                archivo:
                  type: string
                  format: binary
                  description: Archivo de la certificación (JPG, PNG, WebP o PDF, máx 5MB)
                descripcion:
                  type: string
                  description: Descripción de la certificación
                  example: "Certificación en Cardiología Intervencionista - 2024"
      responses:
        '201':
          description: Certificación agregada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Certificación agregada exitosamente. Se ha creado una acción de revisión."
                  data:
                    type: object
                    properties:
                      documentoId:
                        type: integer
                        example: 456
                      accionId:
                        type: integer
                        example: 789
        '400':
          description: Solicitud inválida (archivo faltante, descripción faltante, etc.)
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor)
        '500':
          description: Error interno del servidor

