  /auth/cuenta:
    delete:
      summary: Eliminar cuenta del usuario autenticado (Soft Delete)
      tags:
        - Autenticación
      description: |
        Permite a un usuario autenticado eliminar su cuenta mediante **soft delete**. 
        
        **Validaciones**:
        - Usuario debe estar autenticado (JWT token válido)
        - Contraseña debe ser correcta
        - Confirmación exacta: `"ELIMINAR CUENTA"` (case-sensitive)
        
        **Comportamiento**:
        - Marca el usuario como `estado: 'Eliminado'`
        - Elimina en cascada todas las entidades relacionadas:
          - **Paciente**: condiciones médicas, citas, seguros, favoritos, reseñas
          - **Doctor**: citas, formaciones, especialidades, documentos, experiencias, seguros
          - **Centro**: solicitudes de alianza, experiencias laborales
          - **Todos**: conversaciones y notificaciones
        - Las citas activas se marcan como `'Cancelada'`
        - El historial médico se preserva (sin campo estado)
        - Permite re-registro posterior con el mismo email
        
        **⚠️ ADVERTENCIA**: Esta acción marca la cuenta como eliminada y no se puede deshacer. El usuario puede volver a registrarse con el mismo email si lo desea.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - confirmacion
              properties:
                password:
                  type: string
                  minLength: 8
                  description: Contraseña actual del usuario (mínimo 8 caracteres)
                  example: "MiPassword123"
                confirmacion:
                  type: string
                  enum: ["ELIMINAR CUENTA"]
                  description: Debe ser exactamente "ELIMINAR CUENTA" (case-sensitive)
                  example: "ELIMINAR CUENTA"
            examples:
              eliminacion_valida:
                summary: Solicitud válida de eliminación
                value:
                  password: "MiPassword123"
                  confirmacion: "ELIMINAR CUENTA"
      responses:
        '200':
          description: Cuenta eliminada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Cuenta eliminada exitosamente"
                  nota:
                    type: string
                    example: "Puedes volver a registrarte con el mismo email si lo deseas"
        '400':
          description: Solicitud inválida (datos faltantes o confirmación incorrecta).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Validación fallida"
                  detalles:
                    type: array
                    items:
                      type: string
                    example: 
                      - "confirmacion: confirmacion must be equal to ELIMINAR CUENTA"
              examples:
                datos_incompletos:
                  summary: Datos faltantes
                  value:
                    error: "Datos incompletos"
                    detalles: "Se requiere password y confirmación"
                confirmacion_incorrecta:
                  summary: Confirmación incorrecta
                  value:
                    error: "Validación fallida"
                    detalles:
                      - "confirmacion: confirmacion must be equal to ELIMINAR CUENTA"
                password_corto:
                  summary: Password muy corto
                  value:
                    error: "Validación fallida"
                    detalles:
                      - "password: password must be longer than or equal to 8 characters"
        '401':
          description: No autorizado (token faltante, inválido o contraseña incorrecta).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Contraseña incorrecta"
              examples:
                sin_token:
                  summary: Token no proporcionado
                  value:
                    error: "No autenticado"
                password_incorrecta:
                  summary: Contraseña incorrecta
                  value:
                    error: "Contraseña incorrecta"
        '403':
          description: Cuenta ya eliminada o inactiva.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cuenta inactiva"
                  mensaje:
                    type: string
                    example: "Tu cuenta ha sido eliminada o desactivada. Si deseas volver a usar nuestros servicios, puedes registrarte nuevamente con el mismo email."
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Usuario no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Error al eliminar la cuenta"

