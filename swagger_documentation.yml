    put:
      summary: Actualizar un servicio
      tags:
        - Servicios
      description: |-
        Actualiza los datos de un servicio. Solo el doctor propietario puede modificarlo.
        Todos los campos son opcionales (PATCH semántico).

        **Centros, ubicaciones y horarios — semántica declarativa:**
        Envía el array con los IDs **finales** que deben quedar activos. El sistema se encarga del diff:
        - IDs que estaban y **no aparecen** → se desactivan automáticamente.
        - IDs que no estaban y **sí aparecen** → se crean o reactivan.
        - Array vacío `[]` → desactiva todos los registros de ese grupo.
        - Omitir el campo → no se toca ese grupo (sin cambios).

        **Acceso:** Doctor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                especialidadId:
                  type: integer
                  example: 3
                  description: ID de la especialidad medica del servicio (opcional)
                nombre:
                  type: string
                  example: "Consulta General Actualizada"
                  description: Nombre del servicio (opcional)
                descripcion:
                  type: string
                  example: "Consulta medica actualizada"
                  description: Descripcion del servicio (opcional)
                precio:
                  type: number
                  format: float
                  example: 2000
                  description: Precio del servicio (opcional)
                duracionMinutos:
                  type: integer
                  example: 45
                  description: Duracion del servicio en minutos (opcional)
                sesiones:
                  type: integer
                  example: 2
                  description: "Numero de slots que ocupa el servicio"
                maxPacientesDia:
                  type: integer
                  example: 15
                modalidad:
                  type: string
                  enum: [Presencial, Teleconsulta, Mixta]
                  example: "Teleconsulta"
                  description: Modalidad de atención del servicio (opcional)
                estado:
                  type: string
                  enum: [Activo, Inactivo]
                  example: "Activo"
                centroSaludIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 3]
                  description: |-
                    IDs finales de centros de salud que deben quedar activos en el servicio.
                    Los centros que no aparezcan en la lista serán desactivados automáticamente.
                    Envía `[]` para desactivar todos. Omite el campo para no hacer cambios.
                ubicacionIds:
                  type: array
                  items:
                    type: integer
                  example: [5]
                  description: |-
                    IDs finales de ubicaciones propias del doctor que deben quedar activas en el servicio.
                    Las ubicaciones que no aparezcan en la lista serán desactivadas automáticamente.
                    Envía `[]` para desactivar todas. Omite el campo para no hacer cambios.
                horarioIds:
                  type: array
                  items:
                    type: integer
                  example: [8, 9]
                  description: |-
                    IDs finales de horarios del doctor que deben quedar vinculados al servicio.
                    Los vínculos que no aparezcan en la lista serán desactivados automáticamente.
                    El sistema verifica que cada ID pertenezca al doctor y esté Activo.
                    Envía `[]` para desvincular todos. Omite el campo para no hacer cambios.
      responses:
        '200':
          description: Servicio actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ServicioResumen'
                  message:
                    type: string
                    example: "Servicio actualizado exitosamente"
        '400':
          description: Datos inválidos o estado no permitido
        '401':
          description: No autenticado
        '403':
          description: No eres el propietario del servicio
        '404':
          description: Servicio no encontrado

    delete:
      summary: Eliminar un servicio (soft delete)
      tags:
        - Servicios
      description: |
        Marca el servicio como `Eliminado`. No elimina físicamente el registro.
        Solo el doctor propietario puede eliminarlo.
        **Acceso:** Doctor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: Servicio eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Servicio eliminado exitosamente"
        '401':
          description: No autenticado
        '403':
          description: No eres el propietario del servicio
        '404':
          description: Servicio no encontrado

