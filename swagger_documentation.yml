            type: integer
          description: ID de la especialidad que pasará a ser principal
          example: 3
      responses:
        '200':
          description: Especialidad principal actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Especialidad principal actualizada exitosamente."
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EspecialidadDoctor'
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor)
        '404':
          description: La especialidad no está asociada al doctor o no está activa
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar una especialidad secundaria del doctor
      tags:
        - Doctores
      description: |
        Elimina lógicamente una especialidad **secundaria** del doctor.

        **Restricción:** No se puede eliminar la especialidad principal directamente.
        Primero hay que designar otra como principal con `PATCH`.
      security:
        - bearerAuth: []
      parameters:
        - name: id_especialidad
          in: path
          required: true
          schema:
            type: integer
          description: ID de la especialidad secundaria a eliminar
          example: 5
      responses:
        '200':
          description: Especialidad eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Especialidad eliminada exitosamente."
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor)
        '404':
          description: La especialidad no está asociada al doctor o no está activa
        '409':
