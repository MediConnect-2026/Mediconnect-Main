      description: |
        Crea un nuevo bloque horario para el doctor autenticado.

        **Acceso:** Doctor autenticado. El `doctorId` se obtiene del token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Bloque Matutino"
                  description: Nombre descriptivo del bloque horario
                diasSemana:
                  type: array
                  items:
                    type: integer
                    minimum: 1
                    maximum: 7
                  minItems: 1
                  example: [1, 3, 5]
                  description: |
                    Días de la semana en que aplica este horario.
                    `1`=Lunes, `2`=Martes, `3`=Miércoles, `4`=Jueves, `5`=Viernes, `6`=Sábado, `7`=Domingo.
                    Mínimo 1 elemento.
                horaInicio:
                  type: string
                  example: "08:00"
                  description: Hora de inicio en formato HH:mm o HH:mm:ss
                horaFin:
                  type: string
                  example: "12:00"
                  description: Hora de fin en formato HH:mm o HH:mm:ss
              required:
                - nombre
                - diasSemana
                - horaInicio
                - horaFin
