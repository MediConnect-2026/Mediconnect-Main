  /doctores/especialidades:
    get:
      summary: Obtener especialidades del doctor autenticado
      tags:
        - Doctores
      description: |
        Retorna todas las especialidades activas del doctor autenticado,
        ordenadas con la principal primero.

        **Traducción automática:** Agrega `?target=en&translate_fields=especialidades.nombre,especialidades.descripcion` para traducir los nombres de las especialidades.
      security:
        - bearerAuth: []
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "especialidades.nombre,especialidades.descripcion"
          description: "Campos a traducir separados por coma. Soporta dot-notation para arrays anidados"
      responses:
        '200':
          description: Especialidades obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EspecialidadDoctor'
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor)
        '500':
          description: Error interno del servidor

    put:
      summary: Reemplazar especialidades del doctor
      tags:
        - Doctores
      description: |
        Reemplaza **toda** la configuración de especialidades del doctor en una
        transacción atómica:
        - Elimina lógicamente las que ya no estén en la nueva lista.
        - Crea las que sean nuevas.
        - Actualiza `es_principal` en todas.

        **Regla:** La especialidad principal no puede aparecer también en
        `ids_especialidades_secundarias`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id_especialidad_principal
              properties:
                id_especialidad_principal:
                  type: integer
                  description: ID de la especialidad que será la principal
                  example: 2
                ids_especialidades_secundarias:
                  type: array
                  items:
                    type: integer
                  description: IDs de las especialidades secundarias (puede estar vacío)
                  example: [3, 5]
      responses:
        '200':
          description: Especialidades actualizadas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Especialidades actualizadas exitosamente."
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EspecialidadDoctor'
        '400':
          description: |
            Solicitud inválida — falta `id_especialidad_principal` o la
            especialidad principal aparece también en secundarias
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor)
        '404':
          description: Una o más especialidades del catálogo no encontradas
        '500':
          description: Error interno del servidor

