openapi: 3.0.0
info:
  title: MediConnect API
  version: 1.0.0
  description: Documentación oficial del API de MediConnect.
  contact:
    name: Equipo de Desarrollo MediConnect
servers:
  - url: http://localhost:3000/api
    description: Servidor de Desarrollo Local

tags:
  - name: Autenticación
    description: Login (email/contraseña y Google), registro (OTP, token) y completar registro de paciente/doctor
  - name: Traductor
    description: Endpoints de traducción del sistema
  - name: Utilidades de Traducción
    description: Endpoints para gestionar y monitorear el sistema de traducción automática
  - name: Provincias
    description: Endpoints para gestionar provincias
  - name: Municipios
    description: Endpoints para gestionar municipios
  - name: DistritosMunicipales
    description: Endpoints para gestionar distritos municipales
  - name: Secciones
    description: Endpoints para gestionar secciones
  - name: Barrios
    description: Endpoints para gestionar barrios
  - name: Ubicaciones
    description: Endpoints para gestionar ubicaciones
  - name: Horarios
    description: Endpoints para gestionar horarios
  - name: ServiciosHorarios
    description: Endpoints para gestionar relaciones entre servicios y horarios
  - name: Especialidades
    description: Endpoints para gestionar especialidades médicas
  - name: Pacientes
    description: Endpoints para gestionar pacientes
  - name: Doctores
    description: Endpoints para gestionar doctores
  - name: Acciones
    description: Endpoints para revisión administrativa de documentos de doctores
  - name: TiposCentrosSalud
    description: Endpoints para gestionar tipos de centros de salud
  - name: CentrosSalud
    description: Endpoints para gestionar centros de salud y completar su perfil
  - name: SolicitudesAlianza
    description: Sistema de solicitudes de alianza bidireccional entre doctores y centros de salud
  - name: ExperienciasLaborales
    description: Endpoints para gestionar experiencias laborales de doctores
  - name: FormacionesAcademicas
    description: Endpoints para gestionar formaciones académicas de doctores
  - name: Paises
    description: Endpoints para gestionar países (geografía)
  - name: Universidades
    description: Endpoints para gestionar universidades
  - name: Autenticación
    description: Endpoints para autenticación y gestión de tokens JWT
  - name: Notificaciones
    description: Endpoints para gestión de notificaciones en tiempo real
  - name: Conversaciones
    description: Endpoints para gestión de conversaciones de chat entre usuarios
  - name: Mensajes
    description: Endpoints para gestión de mensajes dentro de conversaciones
  - name: CondicionesMedicas
    description: Endpoints para gestionar condiciones médicas (alergias y enfermedades) y su relación con pacientes
  - name: Seguros
    description: Endpoints para gestionar seguros médicos (Admin CRUD, Pacientes máx 3, Doctores ilimitados)
  - name: TiposSeguros
    description: Endpoints para gestionar tipos de seguros (Admin CRUD, Cliente solo lectura)
  - name: Servicios
    description: Endpoints para gestionar servicios médicos ofrecidos por doctores (CRUD, imágenes, desactivación)
  - name: Reseñas
    description: Sistema de calificaciones y comentarios que los pacientes dejan sobre los servicios médicos
  - name: Favoritos
    description: Permite a los pacientes marcar y gestionar sus doctores favoritos
  - name: Media
    description: Gestión de archivos multimedia (imágenes, audios, videos, documentos, ZIP) para el chat y otros módulos

# --- RUTAS (ENDPOINTS) ---
paths:
  /auth/login:
    post:
      summary: Login con email y contraseña
      tags:
        - Autenticación
      description: Permite a un usuario (Doctor, Paciente, Centro de Salud o Admin) iniciar sesión con email y contraseña. Devuelve un par de tokens (access/refresh) y datos detallados del usuario.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@mediconnect.com
                  description: Correo electrónico del usuario.
                password:
                  type: string
                  minLength: 6
                  description: Contraseña (mínimo 6 caracteres).
      responses:
        '200':
          description: Login exitoso. Devuelve accessToken, refreshToken y datos del usuario.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                    description: JWT de acceso de corta duración (usar en Authorization Bearer).
                  refreshToken:
                    type: string
                    description: JWT de refresco para renovar el accessToken.
                  usuario:
                    $ref: '#/components/schemas/UsuarioDetallado'
        '400':
          description: Datos inválidos (email/password mal formateados).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuario inactivo o bloqueado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google:
    post:
      summary: Login con Google (OAuth)
      tags:
        - Autenticación
      description: |
        Recibe el **idToken** obtenido del frontend (Google Sign-In) y realiza una de tres acciones:
        
        1. **Login:** Si el usuario ya tiene su cuenta de Google vinculada, devuelve `estado: 'login'` con tokens (accessToken y refreshToken).
        2. **Vincular:** Si el email ya existe en la BD pero no tiene Google vinculado, vincula la cuenta y devuelve `estado: 'login'` con tokens.
        3. **Registro:** Si el usuario es nuevo, devuelve `estado: 'registro'` con un `registroToken` temporal. El usuario debe usar este token para elegir su tipo de cuenta (Paciente/Doctor).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
              properties:
                idToken:
                  type: string
                  description: Token ID de Google (obtenido del cliente con Google Sign-In).
      responses:
        '200':
          description: Autenticación de Google exitosa. Devuelve diferentes respuestas según el estado.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Login/Vincular exitoso (usuario existente)
                    properties:
                      success:
                        type: boolean
                        example: true
                      estado:
                        type: string
                        example: 'login'
                      accessToken:
                        type: string
                        description: JWT de acceso de corta duración (incluir en Authorization Bearer).
                      refreshToken:
                        type: string
                        description: JWT de refresco para renovar el accessToken.
                      usuario:
                        $ref: '#/components/schemas/UsuarioDetallado'
                  - type: object
                    description: Registro (usuario nuevo - debe elegir tipo de cuenta)
                    properties:
                      success:
                        type: boolean
                        example: true
                      estado:
                        type: string
                        example: 'registro'
                      message:
                        type: string
                        example: 'Por favor completa tu registro seleccionando tu tipo de usuario'
                      registroToken:
                        type: string
                        description: Token temporal para completar el registro (válido por 1 hora)
        '400':
          description: Falta idToken o solicitud inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token de Google inválido o expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error del servidor (p. ej. GOOGLE_CLIENT_ID no configurado).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google/attach-password:
    post:
      summary: Asociar contraseña local a cuenta verificada por Google
      tags:
        - Autenticación
      description: |
        Verifica un `idToken` de Google y establece una contraseña local para la cuenta asociada al email del token.
        Útil cuando el usuario se registró con Google y desea poder iniciar sesión con email/password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
                - password
              properties:
                idToken:
                  type: string
                  description: ID token de Google (obtenido con Google Sign-In).
                password:
                  type: string
                  minLength: 6
                  description: Nueva contraseña local a asociar.
      responses:
        '200':
          description: Contraseña asociada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Contraseña asociada correctamente.'
        '400':
          description: Parámetros inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: idToken inválido o expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /traduccion:
    post:
      summary: Traducción dinámica de objetos JSON
      tags: 
        - Traductor
      description: Recibe un objeto JSON arbitrario y una lista de campos, y retorna el objeto con esos campos traducidos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                translate_fields:
                  type: array
                  items:
                    type: string
                  example: ["motivo", "diagnostico"]
                source:
                  type: string
                  example: "es"
                target:
                  type: string
                  example: "en"
                # Campos dinámicos de ejemplo
                id_paciente:
                  type: integer
                  example: 504
                motivo:
                  type: string
                  example: "Dolor de cabeza intenso"
                diagnostico:
                  type: string
                  example: "Migraña severa"
      responses:
        '200':
          description: Traducción exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                  original:
                    type: object
                  result:
                    type: object
        '400':
          description: Faltan parámetros (translate_fields)
        '500':
          description: Error en el servidor durante la traducción

  /auth/registro/solicitar-codigo:
    post:
      summary: Solicitar código OTP para registro
      tags:
        - Autenticación
      description: Solicita un código OTP que será enviado al correo electrónico del usuario para validar su identidad antes de completar el registro.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@mediconnect.com"
                  description: Correo electrónico del usuario que desea registrarse.
              required:
                - email
      responses:
        '200':
          description: Código OTP enviado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Código de registro enviado al correo electrónico.
        '400':
          description: Solicitud inválida (por ejemplo, falta el email).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El correo ya está registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/registro/validar-codigo:
    post:
      summary: Validar código OTP y generar token de registro
      tags:
        - Autenticación
      description: Valida el código OTP enviado al correo electrónico del usuario y genera un token de registro temporal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@mediconnect.com"
                  description: Correo electrónico del usuario.
                codigo:
                  type: string
                  example: "123456"
                  description: Código OTP enviado al correo electrónico.
              required:
                - email
                - codigo
      responses:
        '200':
          description: Código validado correctamente y token de registro generado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Código validado correctamente."
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                        description: Token de registro temporal para completar el registro.
        '400':
          description: Solicitud inválida (por ejemplo, falta el email o el código).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Código OTP inválido o expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /translation/languages:
    get:
      summary: Obtener lista de idiomas soportados
      tags:
        - Utilidades de Traducción
      description: Retorna la lista completa de idiomas soportados por el sistema de traducción (más de 100 idiomas).
      responses:
        '200':
          description: Lista de idiomas obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 100
                  languages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          example: "es"
                        name:
                          type: string
                          example: "Español"
        '500':
          description: Error obteniendo idiomas

  /translation/health:
    get:
      summary: Health check del sistema de traducción
      tags:
        - Utilidades de Traducción
      description: Verifica el estado de todos los componentes del sistema de traducción (caché, rate limiter, idiomas).
      responses:
        '200':
          description: Sistema saludable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                  components:
                    type: object
                    properties:
                      cache:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "operational"
                          size:
                            type: integer
                            example: 145
                          utilization:
                            type: string
                            example: "14.50%"
                      rateLimiter:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "operational"
                          trackedIPs:
                            type: integer
                            example: 12
                      languages:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "operational"
                          supported:
                            type: integer
                            example: 100
        '500':
          description: Sistema no saludable

  /auth/registro/paciente:
    post:
      summary: Completar registro de paciente
      tags:
        - Autenticación
      description: Completa el registro de un paciente después de validar el código OTP. Requiere un token de registro válido enviado en el header Authorization sin el prefijo "Bearer".
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Juan"
                  description: Nombre del paciente.
                apellido:
                  type: string
                  example: "Pérez"
                  description: Apellido del paciente.
                numero_documento:
                  type: string
                  example: "00123456789"
                  description: Número de documento de identificación.
                tipo_documento:
                  type: string
                  enum: ["Cédula", "Pasaporte"]
                  example: "Cédula"
                  description: Tipo de documento de identificación.
                password:
                  type: string
                  format: password
                  example: "SecurePass123!"
                  description: Contraseña del usuario.
                fecha_nacimiento:
                  type: string
                  format: date
                  example: "1990-01-15"
                  description: Fecha de nacimiento del paciente (opcional).
                genero:
                  type: string
                  enum: ["M", "F", "O"]
                  example: "M"
                  description: Género del paciente (opcional).
                altura:
                  type: number
                  example: 175
                  description: Altura del paciente en cm (opcional).
                peso:
                  type: number
                  example: 70
                  description: Peso del paciente en kg (opcional).
                tipo_sangre:
                  type: string
                  enum: ["A+", "A-", "B+", "B-", "AB+", "AB-", "O+", "O-"]
                  example: "O+"
                  description: Tipo de sangre del paciente (opcional).
                fotoPerfil:
                  type: string
                  format: binary
                  description: Foto de perfil del paciente.
                fotoDocumento:
                  type: string
                  format: binary
                  description: Foto del documento de identificación del paciente.
      responses:
        '201':
          description: Paciente registrado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Paciente registrado exitosamente.
        '400':
          description: Datos inválidos o token faltante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token de registro inválido o expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /translation/cache/stats:
    get:
      summary: Obtener estadísticas del caché de traducciones
      tags:
        - Utilidades de Traducción
      description: Retorna estadísticas detalladas sobre el uso del caché de traducciones.
      responses:
        '200':
          description: Estadísticas del caché obtenidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  cache:
                    type: object
                    properties:
                      size:
                        type: integer
                        example: 145
                      maxSize:
                        type: integer
                        example: 1000
                      utilization:
                        type: number
                        example: 14.5
                      entries:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            hits:
                              type: integer
                            age:
                              type: integer
                  message:
                    type: string
        '500':
          description: Error obteniendo estadísticas del caché

  /auth/registro/doctor:
    post:
      summary: Completar registro de doctor
      tags:
        - Autenticación
      description: Completa el registro de un doctor después de validar el código OTP. Requiere un token de registro válido enviado en el header Authorization sin el prefijo "Bearer".
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Ana"
                  description: Nombre del doctor.
                apellido:
                  type: string
                  example: "Gómez"
                  description: Apellido del doctor.
                genero:
                  type: string
                  enum: ["M", "F", "O"]
                  example: "F"
                  description: Género del doctor.
                fecha_nacimiento:
                  type: string
                  format: date
                  example: "1985-06-20"
                  description: Fecha de nacimiento del doctor.
                nacionalidad:
                  type: string
                  example: "Dominicana"
                  description: Nacionalidad del doctor.
                telefono:
                  type: string
                  example: "+1-809-555-1234"
                  description: Teléfono del doctor.
                tipo_documento:
                  type: string
                  enum: ["Cédula", "Pasaporte"]
                  example: "Cédula"
                  description: Tipo de documento de identificación.
                numero_documento:
                  type: string
                  example: "00123456789"
                  description: Número de documento de identificación.
                password:
                  type: string
                  format: password
                  example: "SecurePass123!"
                  description: Contraseña del usuario.
                exequatur:
                  type: string
                  example: "123456"
                  description: Número de exequatur del doctor.
                biografia:
                  type: string
                  example: "Especialista en cardiología con 10 años de experiencia."
                  description: Biografía del doctor (opcional).
                formaciones:
                  type: string
                  example: '[{"id_especialidad": 1, "id_universidad": 2, "fecha_inicio": "2010-01-01", "fecha_finalizacion": "2014-12-31", "estado": "Finalizado"}]'
                  description: Array JSON con las formaciones académicas del doctor.
                id_especialidad_principal:
                  type: integer
                  example: 1
                  description: ID de la especialidad principal del doctor (obligatorio). Solo puede tener una especialidad principal.
                ids_especialidades_secundarias:
                  type: string
                  example: '[2,3,5]'
                  description: Array JSON con los IDs de las especialidades secundarias del doctor (opcional). No puede incluir la especialidad principal.
                fotoPerfil:
                  type: string
                  format: binary
                  description: Foto de perfil del doctor (1 archivo requerido).
                fotoDocumento:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: |
                    Fotos del documento de identificación del doctor.
                    **Mínimo**: 1 archivo
                    **Máximo**: 2 archivos
                    **Formatos**: JPEG, PNG, WEBP, PDF
                    **Tamaño máximo por archivo**: 5MB
                tituloAcademico:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: |
                    Archivos de títulos académicos del doctor.
                    **Mínimo**: 1 archivo
                    **Máximo**: 10 archivos
                    **Formatos**: JPEG, PNG, WEBP, PDF
                    **Tamaño máximo por archivo**: 5MB
                certificaciones:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: |
                    Archivos de certificaciones adicionales del doctor.
                    **Mínimo**: 1 archivo
                    **Máximo**: Ilimitado
                    **Formatos**: JPEG, PNG, WEBP, PDF
                    **Tamaño máximo por archivo**: 5MB
                descripciones_documentos:
                  type: string
                  example: '["Cédula frontal", "Cédula reverso"]'
                  description: Array JSON con descripciones opcionales para cada foto de documento (debe coincidir con el número de archivos subidos).
                descripciones_titulos:
                  type: string
                  example: '["Medicina General", "Cardiología", "Especialización en Cirugía"]'
                  description: Array JSON con descripciones opcionales para cada título académico (debe coincidir con el número de archivos subidos).
                descripciones_certificaciones:
                  type: string
                  example: '["Certificación BLS", "Certificación ACLS", "Diplomado en Urgencias"]'
                  description: Array JSON con descripciones opcionales para cada certificación (debe coincidir con el número de archivos subidos).
      responses:
        '201':
          description: Doctor registrado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Doctor registrado exitosamente. Su solicitud está en revisión.
        '400':
          description: Datos inválidos o token faltante.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token de registro inválido o expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
