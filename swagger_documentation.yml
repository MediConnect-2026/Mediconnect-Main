        '404':
          description: Relación ServicioHorario no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto - La nueva combinación de servicioId/horarioId ya existe (violación de PRIMARY KEY)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar una relación ServicioHorario
