        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos. Agrega los siguientes parámetros de query:
        
        - `target`: Idioma destino (ej: en, fr, de)

        - `source`: Idioma origen (opcional, default: es)

        - `translate_fields`: Campos a traducir separados por coma (ej: nombre)
        
        Ejemplo: `/api/provincias?target=en&translate_fields=nombre`
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: Idioma destino para traducción automática (activa la traducción)
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre"
          description: Campos a traducir separados por coma (ej nombre,descripcion)
      responses:
        '200':
          description: Provincias obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Provincia'
                  count:
                    type: integer
                    example: 24
                  message:
                    type: string
                    example: Provincias obtenidas exitosamente
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
