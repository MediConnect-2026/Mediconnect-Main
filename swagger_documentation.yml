    get:
      summary: Listar todos los barrios activos
      tags:
        - Barrios
      description: Obtiene una lista de todos los barrios con estado activo o inactivo.
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre"
          description: "Campos a traducir separados por coma (ej: nombre)"
      responses:
        '200':
          description: Barrios obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Barrio'
                  count:
                    type: integer
                    example: 15
                  message:
                    type: string
                    example: Barrios obtenidos exitosamente
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Crear un nuevo barrio
      tags:
        - Barrios
      description: Crea un nuevo barrio en el sistema. El nombre debe ser único en la sección y la sección debe existir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                seccionId:
                  type: integer
                  example: 5
                  description: ID de la sección a la que pertenece el barrio
                nombre:
                  type: string
                  example: "Los Prados"
                  description: Nombre del barrio
              required:
                - seccionId
                - nombre
      responses:
        '201':
          description: Barrio creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Barrio'
                  message:
                    type: string
                    example: Barrio creado exitosamente
        '400':
          description: Datos inválidos o campos requeridos faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El barrio ya existe en la sección
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

