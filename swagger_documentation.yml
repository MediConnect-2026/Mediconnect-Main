          schema:
            type: integer
          description: ID del doctor a favoritar (usuarioId del doctor)
          example: 12
      responses:
        '201':
          description: Doctor agregado a favoritos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Doctor agregado a favoritos exitosamente
                  data:
                    $ref: '#/components/schemas/DoctorFavorito'
        '400':
          description: doctorId inválido
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Paciente)
        '404':
          description: Doctor no encontrado
        '409':
          description: El doctor ya está en la lista de favoritos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Eliminar doctor de favoritos
      tags:
        - Favoritos
      description: |
        El paciente autenticado elimina un doctor de su lista de favoritos (soft-delete).

        **Acceso:** Solo Paciente
      security:
        - bearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: integer
          description: ID del doctor a eliminar de favoritos
          example: 12
      responses:
        '200':
          description: Doctor eliminado de favoritos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  mensaje:
                    type: string
                    example: Doctor eliminado de favoritos exitosamente
        '400':
          description: doctorId inválido
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Paciente)
        '404':
          description: El doctor no está en la lista de favoritos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # ─── Media ───────────────────────────────────────────────────────────────
    Media:
      type: object
      description: Archivo multimedia registrado en el sistema (imagen, audio, video, documento).
      properties:
        id:
          type: integer
          example: 1
        archivo:
          type: string
          description: URL pública del archivo en el storage
          example: "https://cdn.example.com/public-assets/media/42/1234_foto.jpg"
        nombre:
          type: string
          nullable: true
          example: "radiografia_torax.jpg"
        tipoMime:
          type: string
          nullable: true
          example: "image/jpeg"
        tamanioBytes:
          type: string
          nullable: true
          description: Tamaño en bytes (formato string por BigInt)
          example: "204800"
        tamanioFormateado:
          type: string
          example: "200.00 KB"
        estado:
          type: string
          enum: ["Activo", "Eliminado"]
          example: "Activo"
        fechaSubida:
          type: string
          format: date-time
          example: "2026-03-03T04:42:00Z"
        esImagen:
          type: boolean
          example: true
        esVideo:
          type: boolean
          example: false
        esAudio:
          type: boolean
          example: false
        esDocumento:
          type: boolean
          example: false

    # ─── Favoritos ───────────────────────────────────────────────────────────
    DoctorFavorito:
      type: object
      description: Entrada de doctor favorito de un paciente, incluyendo datos básicos del doctor.
      properties:
        pacienteId:
          type: integer
          example: 5
        doctorId:
          type: integer
          example: 12
        agregadoEn:
          type: string
          format: date-time
          example: "2026-03-04T13:00:00Z"
        estado:
          type: string
          enum: [Activo, Inactivo]
          example: Activo
        doctor:
          type: object
          nullable: true
          properties:
            usuarioId:
              type: integer
              example: 12
            nombre:
              type: string
              example: "Juan"
            apellido:
              type: string
              example: "García"
            fotoPerfil:
              type: string
              nullable: true
              example: "https://cdn.example.com/fotos/doctor.jpg"
            calificacionPromedio:
              type: number
              nullable: true
              example: 4.8
            especialidades:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  nombre:
                    type: string
                    example: "Cardiología"
                  esPrincipal:
                    type: boolean
                    example: true

    # ─── Reseñas ─────────────────────────────────────────────────────────────
    Resena:
      type: object
      description: Reseña completa de un servicio médico.
      properties:
        id:
          type: integer
          example: 1
        servicioId:
          type: integer
          example: 5
        citaId:
          type: integer
          nullable: true
          example: 12
          description: Cita que originó la reseña (opcional).
        pacienteId:
          type: integer
          example: 42
        doctorId:
          type: integer
          example: 7
        calificacion:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comentario:
          type: string
          nullable: true
          example: "Excelente atención, muy profesional."
        estado:
          type: string
          enum: [Publicada, Eliminada]
          example: Publicada
        creadoEn:
          type: string
          format: date-time
        actualizadoEn:
          type: string
          format: date-time
          nullable: true
        paciente:
          type: object
          nullable: true
          properties:
            nombre:
              type: string
              example: "Carlos"
            apellido:
              type: string
              example: "García"
            usuario:
              type: object
              properties:
                fotoPerfil:
                  type: string
                  nullable: true
                  example: "https://example.com/foto.jpg"
        servicio:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 5
            nombre:
              type: string
              example: "Consulta General"

    ResenaResumen:
      type: object
      description: Reseña resumida (para listas embebidas en servicios/doctores).
      properties:
        id:
          type: integer
          example: 1
        calificacion:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comentario:
          type: string
          nullable: true
          example: "Muy buena atención."
        creadoEn:
          type: string
          format: date-time
        paciente:
          type: object
          nullable: true
          properties:
            nombre:
              type: string
              example: "Carlos"
            apellido:
              type: string
              example: "García"
            usuario:
              type: object
              properties:
                fotoPerfil:
                  type: string
                  nullable: true

    Paginacion:
      type: object
      properties:
        total:
          type: integer
          example: 24
        pagina:
          type: integer
          example: 1
        limite:
          type: integer
          example: 10
        totalPaginas:
          type: integer
          example: 3

    # ─── Servicios ───────────────────────────────────────────────────────────
    ServicioImagen:
      type: object
      properties:
        id:
          type: integer
          example: 1
        servicioId:
          type: integer
          example: 10
        url:
          type: string
          example: "https://xyz.supabase.co/storage/v1/object/public/public-assets/servicios/5/10/img.jpg"
        orden:
          type: integer
          example: 0
        estado:
          type: string
          example: "Activo"
        creadoEn:
          type: string
          format: date-time

    ServicioResumen:
      type: object
      description: Servicio en listado (incluye sólo la primera imagen)
      properties:
        id:
          type: integer
          example: 10
        doctorId:
          type: integer
          example: 5
        especialidadId:
          type: integer
          example: 3
        nombre:
          type: string
          example: "Consulta General"
        descripcion:
          type: string
          nullable: true
          example: "Consulta médica general de 30 minutos"
        precio:
          type: number
          example: 1500.00
        duracionMinutos:
          type: integer
          example: 30
          description: "Duración de cada slot en minutos"
        sesiones:
          type: integer
          example: 1
          description: "Número de slots que ocupa el servicio. Ej: si duracionMinutos=30 y sesiones=2, el servicio dura 1h."
        maxPacientesDia:
          type: integer
          nullable: true
          example: 20
        calificacionPromedio:
          type: number
          nullable: true
          example: 4.5
        modalidad:
          type: string
          enum: [Presencial, Teleconsulta, Mixta]
          example: "Presencial"
          description: Modalidad de atención del servicio
        estado:
          type: string
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
        actualizadoEn:
          type: string
          format: date-time
          nullable: true
        imagenes:
          type: array
          items:
            $ref: '#/components/schemas/ServicioImagen'
        especialidad:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        tipoServicio:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        centros:
          type: array
          description: Centros de salud donde se ofrece el servicio
          items:
            type: object
            properties:
              id_centro_salud:
                type: integer
              estado:
                type: string
                example: "Activo"
              centros_salud:
                type: object
                properties:
                  usuarioId:
                    type: integer
                  nombreComercial:
                    type: string
                    example: "Clínica Santa María"
                  foto_perfil:
                    type: string
                    nullable: true
                  ubicacion:
                    type: object
                    properties:
                      id:
                        type: integer
                      direccion:
                        type: string
                        example: "Av. Independencia #45"
                      barrio:
                        type: object
                        properties:
                          nombre:
                            type: string
        ubicacion:
          type: object
          nullable: true
          description: Ubicación del servicio con jerarquía geográfica completa y coordenadas
          properties:
            id:
              type: integer
              example: 12
            direccion:
              type: string
              example: "Calle 5ta #10, Local 2"
            nombre:
              type: string
              nullable: true
              example: "Consultorio Norte"
            codigoPostal:
              type: string
              nullable: true
              example: "10101"
            latitud:
              type: number
              nullable: true
              example: 18.4735
            longitud:
              type: number
              nullable: true
              example: -69.9312
            barrio:
              type: object
              nullable: true
              properties:
                id:
                  type: integer
                  example: 5
                nombre:
                  type: string
                  example: "Los Prados"
                seccion:
                  type: object
                  nullable: true
                  properties:
                    id:
                      type: integer
                      example: 3
                    nombre:
                      type: string
                      example: "Sección Norte"
                    distritoMunicipal:
                      type: object
                      nullable: true
                      description: |-
                        Puede ser null. Cuando es null, el municipio viene
                        directamente en el campo `municipio` de la sección.
                      properties:
                        id:
                          type: integer
                          example: 2
                        nombre:
                          type: string
                          example: "Distrito Nacional"
                        municipio:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            nombre:
                              type: string
                              example: "Santo Domingo de Guzmán"
                            provincia:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  example: 1
                                nombre:
                                  type: string
                                  example: "Distrito Nacional"
                    municipio:
                      type: object
                      nullable: true
                      description: |-
                        Solo presente cuando `distritoMunicipal` es null.
                        Municipio al que pertenece directamente la sección.
                      properties:
                        id:
                          type: integer
                          example: 1
                        nombre:
                          type: string
                          example: "Santo Domingo de Guzmán"
                        provincia:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            nombre:
                              type: string
                              example: "Distrito Nacional"
        horarios:
          type: array
          description: Horarios del servicio con su centro/ubicación
          items:
            type: object
            properties:
              servicioId:
                type: integer
              horarioId:
                type: integer
              estado:
                type: string
                example: "Activo"
              horario:
                type: object
                properties:
                  id:
                    type: integer
                  nombre:
                    type: string
                    example: "Lunes mañana"
                  diasSemana:
                    type: array
                    items:
                      type: integer
                      minimum: 1
                      maximum: 7
                    description: "1=Lunes … 7=Domingo"
                    example: [1, 3, 5]
                  horaInicio:
                    type: string
                    format: date-time
                  horaFin:
                    type: string
                    format: date-time
                  centroSalud:
                    type: object
                    nullable: true
                    properties:
                      usuarioId:
                        type: integer
                      nombreComercial:
                        type: string
                  ubicacion:
                    type: object
                    properties:
                      id:
                        type: integer
                      direccion:
                        type: string
                        example: "Av. Independencia #45"
                      barrio:
                        type: object
                        properties:
                          nombre:
                            type: string
                            example: "Los Prados"

    ServicioDetalle:
      allOf:
        - $ref: '#/components/schemas/ServicioResumen'
        - type: object
          description: Servicio con detalle completo (doctor, horarios completos, todas las imágenes)
          properties:
            doctor:
              type: object
              properties:
                usuarioId:
                  type: integer
                nombre:
                  type: string
                apellido:
                  type: string
                especialidadPrincipal:
                  type: string
                  nullable: true
                usuario:
                  type: object
                  properties:
                    id:
                      type: integer
                    email:
                      type: string
                    fotoPerfil:
                      type: string
                      nullable: true

    # ─── Otros schemas ────────────────────────────────────────────────────────
    Provincia:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Buenos Aires"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Municipio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        provinciaId:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Santo Domingo"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    DistritoMunicipal:
      type: object
      properties:
        id:
          type: integer
          example: 1
        municipioId:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Distrito Central"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Seccion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        distritoMunicipalId:
          type: integer
          nullable: true
          example: 1
          description: ID del distrito municipal (puede ser null)
        municipioId:
          type: integer
          nullable: true
          example: 1
          description: ID del municipio (puede ser null)
        nombre:
          type: string
          example: "Sección A"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Barrio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        seccionId:
          type: integer
          example: 5
          description: ID de la sección a la que pertenece el barrio
        nombre:
          type: string
          example: "Los Prados"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    UsuarioDetallado:
      type: object
      description: Usuario autenticado con información básica y perfil asociado según el rol.
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: "usuario@mediconnect.com"
        rol:
          type: string
          example: "Paciente"
          description: "Rol del usuario (Paciente, Doctor, Centro de Salud, Administrador)"
        fotoPerfil:
          type: string
          nullable: true
          example: "https://cdn.supabase.io/.../profile.jpg"
        paciente:
          type: object
          nullable: true
          description: Información de perfil de paciente (solo si rol = Paciente).
        doctor:
          type: object
          nullable: true
          description: Información de perfil de doctor (solo si rol = Doctor).
        centroSalud:
          type: object
          nullable: true
          description: Información de perfil de centro de salud (solo si rol = Centro de Salud).

    Ubicacion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        barrioId:
          type: integer
          example: 2
          description: ID del barrio al que pertenece la ubicación
        direccion:
          type: string
          example: "Calle Principal 123"
          description: Dirección de la ubicación
        nombre:
          type: string
          nullable: true
          example: "Consultorio Norte"
          description: Nombre descriptivo de la ubicación (puede ser null)
        codigoPostal:
          type: string
          nullable: true
          example: "28001"
          description: Código postal (puede ser null)
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        puntoGeografico:
          type: object
          nullable: true
          description: Coordenadas geográficas en formato GeoJSON Point (puede ser null)
          properties:
            type:
              type: string
              enum: [Point]
              example: Point
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              example: [-70.1234, 18.5678]
              description: "[longitud, latitud]"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    Horario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        doctorId:
          type: integer
          example: 5
          description: ID del doctor que tiene este horario
        nombre:
          type: string
          example: "Bloque Matutino"
          description: Nombre descriptivo del bloque horario
        diasSemana:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          example: [1, 3, 5]
          description: |
            Días de la semana asociados a este horario (desde `horarios_dias`).
            `1`=Lunes, `2`=Martes, `3`=Miércoles, `4`=Jueves, `5`=Viernes, `6`=Sábado, `7`=Domingo.
        horaInicio:
          type: string
          format: date-time
          example: "2025-01-22T08:00:00Z"
          description: Hora de inicio del horario en formato ISO 8601
        horaFin:
          type: string
          format: date-time
          example: "2025-01-22T12:00:00Z"
          description: Hora de fin del horario en formato ISO 8601
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"

    ServicioHorario:
      type: object
      description: Relación entre un servicio médico y un horario disponible con datos relacionados
      properties:
        servicioId:
          type: integer
          example: 1
          description: ID del servicio médico
        horarioId:
          type: integer
          example: 1
          description: ID del horario
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
          description: Estado de la relación (si está disponible o no)
        creadoEn:
          type: string
          format: date-time
          example: "2025-01-22T10:30:00Z"
        servicio:
          type: object
          nullable: true
          description: Datos del servicio relacionado
          properties:
            id:
              type: integer
              example: 1
            nombre:
              type: string
              example: "Consulta General"
            descripcion:
              type: string
              example: "Consulta médica general"
            estado:
              type: string
              example: "Activo"
        horario:
          type: object
          nullable: true
          description: Datos del horario relacionado
          properties:
            id:
              type: integer
              example: 1
            nombre:
              type: string
              example: "Turno Mañana"
            diasSemana:
              type: array
              items:
                type: integer
                minimum: 1
                maximum: 7
              example: [1, 3, 5]
              description: "Días de la semana (1=Lunes…7=Domingo)"
            horaInicio:
              type: string
              example: "08:00:00"
            horaFin:
              type: string
              example: "12:00:00"
            estado:
              type: string
              example: "Activo"
          description: Fecha y hora de creación de la relación


    TipoCentroSalud:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Hospital"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-02-02T12:00:00Z"

    Profesion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: "Medicina General"
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2025-02-02T12:00:00Z"

    ExperienciaLaboral:
      type: object
      description: Experiencia laboral de un doctor en una institución médica
      properties:
        id:
          type: integer
          example: 1
        doctorId:
          type: integer
          example: 123
        centroSaludId:
          type: integer
          nullable: true
          example: 5
          description: ID del centro de salud (nulo si es institución externa)
        institucionExterna:
          type: string
          nullable: true
          example: "Hospital General Regional"
          description: Nombre de la institución externa (nulo si es centro de salud)
        profesionId:
          type: integer
          example: 2
        descripcionCargo:
          type: string
          example: "Médico General en el área de emergencias"
        fechaInicio:
          type: string
          format: date
          example: "2020-01-15"
        fechaFinalizacion:
          type: string
          format: date
          nullable: true
          example: "2023-06-30"
          description: Fecha de finalización (nulo si trabaja actualmente)
        trabajaActualmente:
          type: boolean
          example: false
        estado:
          type: string
          enum: ["Activo", "Inactivo", "Eliminado"]
          example: "Activo"
        creadoEn:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        actualizadoEn:
          type: string
          format: date-time
