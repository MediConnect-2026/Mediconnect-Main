  /acciones/{id}/revisar:
    patch:
      summary: Aprobar o rechazar un documento
      tags:
        - Acciones
      description: |
        Permite a un administrador aprobar o rechazar un documento específico.
        
        **Proceso de Aprobación:**
        1. Se actualiza el estado de la acción a "Aprobada"
        2. Se actualiza el estado del documento a "Aprobado"
        3. Si todos los documentos del doctor están aprobados:
           - Se actualiza el estado de verificación del doctor a "Aprobado"
           - Se crea una notificación de cuenta aprobada
        
        **Proceso de Rechazo:**
        1. Se actualiza el estado de la acción a "Rechazada"
        2. Se actualiza el estado del documento a "Rechazado"
        3. Se crea una notificación con el motivo del rechazo
        4. El doctor puede actualizar el documento rechazado
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la acción a revisar
          schema:
            type: integer
          example: 789
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - decision
              properties:
                decision:
                  type: string
                  enum: ["Aprobada", "Rechazada"]
                  description: Decisión del administrador
                  example: "Aprobada"
                comentario:
                  type: string
                  description: Comentario opcional del administrador
                  example: "Documento verificado correctamente"
      responses:
        '200':
          description: Documento revisado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Documento aprobado exitosamente"
                  data:
                    type: object
                    properties:
                      accionId:
                        type: integer
                      documentoId:
                        type: integer
                      decision:
                        type: string
                      doctorAprobado:
                        type: boolean
                        description: Indica si el doctor fue aprobado automáticamente
                        example: true
        '400':
          description: Solicitud inválida (decisión inválida, acción no pendiente, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "La acción no está en estado pendiente"
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Admin)
        '404':
          description: Acción no encontrada
        '500':
          description: Error interno del servidor

