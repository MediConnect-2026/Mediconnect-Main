  # --- CENTROS SALUD ENDPOINTS ---
  /centros-salud/completar-perfil:
    post:
      summary: Completar perfil de centro de salud
      tags:
        - CentrosSalud
      description: |
        Completa el perfil de un centro de salud registrado con todos los datos requeridos.
        
        **Requisitos:**
        - Autenticación JWT requerida (Usuario debe ser Centro de Salud)
        - Archivos requeridos: certificadoSanitario (PDF)
        - Archivos opcionales: fotoPerfil (JPG/PNG)
        
        **Proceso:**
        1. Sube el certificado sanitario a Supabase (secure-documents)
        2. Sube la foto de perfil si se proporciona (public-assets)
        3. Vincula la ubicación existente al centro
        4. Actualiza datos del centro de salud
        5. Crea una acción de revisión para administrador
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - password
                - nombreComercial
                - telefono
                - tipoCentroId
                - ubicacionId
                - certificadoSanitario
              properties:
                password:
                  type: string
                  description: Contraseña para la cuenta del centro de salud (8-100 caracteres)
                  example: "ContrasenaSegura123!"
                nombreComercial:
                  type: string
                  description: Nombre comercial del centro de salud (3-120 caracteres)
                  example: "Clínica del Centro"
                rnc:
                  type: string
                  description: RNC del centro de salud (opcional, 7-20 caracteres)
                  example: "4-12345-6"
                telefono:
                  type: string
                  description: Teléfono de contacto
                  example: "+1-809-123-4567"
                sitioWeb:
                  type: string
                  description: Sitio web del centro (opcional)
                descripcion:
                  type: string
                  description: Descripción del centro de salud (máximo 1000 caracteres)
                  maxLength: 1000
                tipoCentroId:
                  type: number
                  description: ID del tipo de centro de salud
                  example: 1
                ubicacionId:
                  type: number
                  description: ID de la ubicación existente a vincular con el centro (**obligatorio**)
                  example: 42
                certificadoSanitario:
                  type: string
                  format: binary
                  description: Certificado sanitario en PDF (requerido)
                fotoPerfil:
                  type: string
                  format: binary
                  description: Foto de perfil del centro (opcional)
      responses:
        '200':
          description: Perfil completado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: number
                      nombreComercial:
                        type: string
                      estado:
                        type: string
                      estadoVerificacion:
                        type: string
                      message:
                        type: string
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  # ─── CENTROS DE SALUD: ANALÍTICAS ──────────────────────────────────────────────

  /centros-salud/estadisticas/general:
    get:
      summary: Estadísticas generales del centro autenticado
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: |
        Retorna indicadores clave del **Centro** autenticado (semana actual):
        - `totalMedicos` — total de médicos afiliados con solicitud aceptada
        - `totalEspecialidades` — número de especialidades únicas entre todos sus médicos
        - `citasSemanaActual` — total de citas de todos sus médicos en la semana en curso (Lun–Dom)
        - `valoracionPromedio` — promedio de `calificacionPromedio` de los médicos afiliados (`null` si ninguno tiene calificación)
      responses:
        '200':
          description: Estadísticas obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalMedicos:
                        type: integer
                        example: 12
                      totalEspecialidades:
                        type: integer
                        example: 8
                      citasSemanaActual:
                        type: integer
                        example: 47
                      valoracionPromedio:
                        type: number
                        format: float
                        nullable: true
                        example: 4.35
        '401':
          description: No autenticado
        '403':
          description: Solo accesible por Centros

  /centros-salud/estadisticas/crecimiento-medicos:
    get:
      summary: Crecimiento de médicos afiliados al centro
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: |
        Serie temporal del crecimiento de médicos afiliados (solicitudes aceptadas).

        | `periodo`  | Rango | Agrupación |
        |------------|-------|-----------|
        | `semana`   | Semana actual | Por día (Lun–Sáb) |
        | `mes`      | Mes actual | Por semana (Sem 1–4) |
        | `3meses`   | Últimos 3 meses | Por mes |
        | `año`      | Últimos 12 meses | Por mes |
        | `todo`     | Desde la primera afiliación | Por mes |

        Cada punto incluye:
        - `label` — etiqueta del eje X
        - `total` — médicos acumulados hasta ese punto
        - `nuevos` — médicos que se afiliaron en ese sub-período
      parameters:
        - name: periodo
          in: query
          required: false
          schema:
            type: string
            enum: [semana, mes, 3meses, año, todo]
            default: mes
      responses:
        '200':
          description: Datos de crecimiento obtenidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  periodo:
                    type: string
                    example: "mes"
                  totalActual:
                    type: integer
                    example: 12
                  puntos:
                    type: array
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                          example: "Sem 2"
                        total:
                          type: integer
                          example: 10
                        nuevos:
                          type: integer
                          example: 2
        '400':
          description: Período inválido
        '401':
          description: No autenticado

  /centros-salud/estadisticas/distribucion-especialidades:
    get:
      summary: Distribución de especialidades de los médicos afiliados
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: |
        Retorna la distribución de especialidades entre los médicos afiliados al **Centro** autenticado.
        Ordenada de mayor a menor por cantidad de médicos.
        Útil para gráficos de torta o barras.
      responses:
        '200':
          description: Distribución obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Número de especialidades distintas
                    example: 5
                  especialidades:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 2
                        nombre:
                          type: string
                          example: "Cardiología"
                        totalMedicos:
                          type: integer
                          example: 4
                        porcentaje:
                          type: number
                          format: float
                          description: "Porcentaje sobre el total de asignaciones de especialidades (todos los médicos × sus especialidades). Si Cardiología tiene 4 de 10 asignaciones → 40%."
                          example: 33.33
        '401':
          description: No autenticado
        '403':
          description: Solo accesible por Centros

  # ─── CENTROS DE SALUD: PERFIL & GESTIÓN ───────────────────────────────────────

  /centros-salud/mi-perfil:
    get:
      summary: Obtener perfil completo del centro de salud autenticado
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: Retorna todos los datos del centro de salud autenticado, incluyendo tipo de centro, ubicación (barrio, sección) y datos de usuario.
      responses:
        '200':
          description: Perfil obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/CentroSaludPerfil'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Centro de salud no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Editar perfil del centro de salud
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: Actualiza uno o más campos del perfil del centro de salud autenticado. Todos los campos son opcionales.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombreComercial:
                  type: string
                  minLength: 3
                  maxLength: 120
                  example: "Clínica del Este"
                rnc:
                  type: string
                  minLength: 7
                  maxLength: 20
                  example: "4-99999-9"
                tipoCentroId:
                  type: integer
                  example: 2
                sitio_web:
                  type: string
                  format: uri
                  example: "https://clinicadeleste.com"
                descripcion:
                  type: string
                  maxLength: 1000
                  example: "Centro médico especializado en atención primaria"
      responses:
        '200':
          description: Perfil actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Perfil actualizado exitosamente"
                  data:
                    $ref: '#/components/schemas/CentroSaludPerfil'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /centros-salud/mi-perfil/foto:
    put:
      summary: Actualizar foto de perfil del centro de salud
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: "Sube o reemplaza la foto de perfil del centro. Formatos aceptados: JPG, PNG, WebP. Tamaño máximo 5MB."
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - fotoPerfil
              properties:
                fotoPerfil:
                  type: string
                  format: binary
                  description: Imagen en JPG, PNG o WebP (máx. 5MB)
      responses:
        '200':
          description: Foto actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Foto actualizada exitosamente"
                  data:
                    $ref: '#/components/schemas/CentroSaludPerfil'
        '400':
          description: Archivo inválido o no proporcionado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── CENTROS DE SALUD: UBICACIÓN ────────────────────────────────────────────

  /centros-salud/mi-ubicacion:
    get:
      summary: Obtener ubicación del centro de salud
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: Retorna la ubicación actual del centro de salud con barrio y sección.
      responses:
        '200':
          description: Ubicación obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UbicacionDetalle'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar ubicación del centro de salud
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: Actualiza la dirección y/o barrio del centro de salud. Todos los campos son opcionales.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                barrioId:
                  type: integer
                  example: 12
                  description: ID del nuevo barrio
                direccion:
                  type: string
                  maxLength: 255
                  example: "Av. 27 de Febrero #456"
                codigoPostal:
                  type: string
                  maxLength: 10
                  nullable: true
                  example: "10109"
      responses:
        '200':
          description: Ubicación actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Ubicación actualizada exitosamente"
                  data:
                    $ref: '#/components/schemas/UbicacionDetalle'
        '400':
          description: Barrio inválido o datos incorrectos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── CENTROS DE SALUD: DOCTORES ASOCIADOS ────────────────────────────────────

  /centros-salud/mis-doctores:
    get:
      summary: Listar doctores asociados al centro de salud
      tags:
        - CentrosSalud
      security:
        - bearerAuth: []
      description: |
        Retorna todos los doctores que tienen una solicitud de alianza **Aceptada** con el centro autenticado.
        Incluye sus especialidades y servicios activos.
      responses:
        '200':
          description: Lista de doctores asociados
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        solicitudId:
                          type: integer
                          example: 7
                        aliadoDesde:
                          type: string
                          format: date-time
                          example: "2026-02-20T14:00:00Z"
                        doctor:
                          type: object
                          properties:
                            usuarioId:
                              type: integer
                              example: 5
                            nombre:
                              type: string
                              example: "Carlos"
                            apellido:
                              type: string
                              example: "Pérez"
                            exequatur:
                              type: string
                              example: "EX-00123"
                            calificacionPromedio:
                              type: number
                              example: 4.7
                            estado:
                              type: string
                              example: "Activo"
                            usuario:
                              type: object
                              properties:
                                email:
                                  type: string
                                telefono:
                                  type: string
                                fotoPerfil:
                                  type: string
                            especialidades:
                              type: array
                              items:
                                type: object
                            servicios:
                              type: array
                              items:
                                type: object
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── SOLICITUDES DE ALIANZA (LADO CENTRO) ─────────────────────────────────────

  /centros-salud/solicitudes-alianza:
    post:
      summary: Centro envía solicitud de alianza a un doctor
      tags:
        - CentrosSalud
        - SolicitudesAlianza
      security:
        - bearerAuth: []
      description: |
        El centro de salud autenticado envía una solicitud de alianza a un doctor.
        
        **Reglas:**
        - No puede existir una solicitud Pendiente o Aceptada entre el mismo doctor y centro
        - El doctor recibirá la solicitud y será el único que puede aceptarla o rechazarla
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - destinatarioId
              properties:
                destinatarioId:
                  type: integer
                  description: ID (usuarioId) del doctor al que se envía la solicitud
                  example: 5
                mensaje:
                  type: string
                  maxLength: 255
                  example: "Nos gustaría contar con su colaboración en nuestro centro"
      responses:
        '201':
          description: Solicitud enviada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Solicitud de alianza enviada exitosamente"
                  data:
                    $ref: '#/components/schemas/SolicitudAlianza'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ya existe una alianza o solicitud pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Listar solicitudes de alianza del centro
      tags:
        - CentrosSalud
        - SolicitudesAlianza
      security:
        - bearerAuth: []
      description: |
        Retorna todas las solicitudes de alianza del centro autenticado, tanto las que el centro inició como las que recibió de doctores.
        Ordenadas de más reciente a más antigua.
      responses:
        '200':
          description: Lista de solicitudes de alianza
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SolicitudAlianza'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /centros-salud/solicitudes-alianza/{id}:
    put:
      summary: Centro responde a una solicitud de alianza (iniciada por el doctor)
      tags:
        - CentrosSalud
        - SolicitudesAlianza
      security:
        - bearerAuth: []
      description: |
        El centro de salud acepta o rechaza una solicitud que **inició un doctor**.
        
        **Reglas:**
        - Solo se pueden responder solicitudes en estado `Pendiente`
        - Solo puede responder el centro destinatario (el que no inició)
        - Al rechazar, `motivoRechazo` es obligatorio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la solicitud de alianza
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estado
              properties:
                estado:
                  type: string
                  enum: [Aceptada, Rechazada]
                  example: "Aceptada"
                motivoRechazo:
                  type: string
                  maxLength: 255
                  example: "No contamos con disponibilidad en este momento"
      responses:
        '200':
          description: Solicitud respondida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Solicitud aceptada exitosamente"
                  data:
                    $ref: '#/components/schemas/SolicitudAlianza'
        '400':
          description: Estado inválido o solicitud no en estado Pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tienes permisos para responder esta solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── SOLICITUDES DE ALIANZA (LADO DOCTOR) ─────────────────────────────────────

  # ─── ESTADÍSTICAS DEL DOCTOR ───────────────────────────────────────────────

  /doctores/estadisticas/productividad:
    get:
      summary: Análisis de productividad del doctor (consultas e ingresos)
      tags:
        - Doctores
      security:
        - bearerAuth: []
      description: |
        Retorna las **consultas completadas** e **ingresos generados** del Doctor autenticado,
        agrupados en puntos de tiempo según el `periodo` seleccionado:

        | `periodo`  | Rango | Agrupación |
        |------------|-------|-----------|
        | `semana`   | Últimos 7 días | Por día (Lun, Mar…) |
        | `mes`      | Mes actual | Por semana (Sem 1–4) |
        | `3meses`   | Últimos 3 meses | Por mes |
        | `año`      | Últimos 12 meses | Por mes |
        | `todo`     | Desde la primera cita | Por mes |
      parameters:
        - name: periodo
          in: query
          required: false
          schema:
            type: string
            enum: [semana, mes, 3meses, año, todo]
            default: mes
          description: "Período de análisis"
      responses:
        '200':
          description: Análisis de productividad obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  periodo:
                    type: string
                    example: "mes"
                  puntos:
                    type: array
                    description: Puntos del gráfico ordenados cronológicamente
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                          example: "Sem 2"
                        consultas:
                          type: integer
                          example: 720
                        ingresos:
                          type: number
                          format: float
                          example: 19800.00
                  totales:
                    type: object
                    properties:
                      consultas:
                        type: integer
                        example: 2400
                      ingresos:
                        type: number
                        format: float
                        example: 65000.00
        '400':
          description: Período inválido
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

  /doctores/estadisticas/servicios-mas-utilizados:
    get:
      summary: Servicios más utilizados del doctor (pie chart + lista)
      tags:
        - Doctores
      security:
        - bearerAuth: []
      description: |
        Retorna dos colecciones para el Doctor autenticado:
        - **`masUtilizados`** — servicios ordenados desc por número de citas, listos para el gráfico circular, incluyendo `porcentaje` sobre el total.
        - **`servicios`** — lista completa de todos sus servicios (activos e inactivos) con el conteo de citas asociadas.
      responses:
        '200':
          description: Datos de servicios obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  masUtilizados:
                    type: array
                    description: Servicios con al menos 1 cita, ordenados de mayor a menor uso
                    items:
                      type: object
                      properties:
                        servicioId:
                          type: integer
                          example: 3
                        nombre:
                          type: string
                          example: "Consulta médica"
                        totalCitas:
                          type: integer
                          example: 35
                        porcentaje:
                          type: number
                          format: float
                          description: "Porcentaje sobre el total de citas del doctor (0–100)"
                          example: 28.50
                  servicios:
                    type: array
                    description: Lista completa de servicios del doctor
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 3
                        nombre:
                          type: string
                          example: "Consulta médica"
                        precio:
                          type: number
                          format: float
                          nullable: true
                          example: 1500.00
                        estado:
                          type: string
                          enum: [Activo, Inactivo]
                          example: "Activo"
                        modalidad:
                          type: string
                          example: "Presencial"
                        totalCitas:
                          type: integer
                          example: 35
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

  /doctores/estadisticas/resumen:
    get:
      summary: Resumen del mes actual del doctor autenticado
      tags:
        - Doctores
      security:
        - bearerAuth: []
      description: |
        Retorna métricas del **Doctor** autenticado correspondientes al **mes calendario actual**:
        - `totalPacientes` — pacientes únicos atendidos este mes (con al menos una cita)
        - `totalConsultas` — citas en estado `Completada` en el mes actual
        - `totalDineroGanado` — suma del `precio` de los servicios de las citas completadas este mes (redondeado a 2 decimales)
      responses:
        '200':
          description: Resumen obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalPacientes:
                        type: integer
                        example: 45
                      totalConsultas:
                        type: integer
                        example: 65
                      totalDineroGanado:
                        type: number
                        format: float
                        example: 12750.00
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

  /doctores/estadisticas/servicios:
    get:
      summary: Estadísticas de servicios del doctor autenticado
      tags:
        - Doctores
      security:
        - bearerAuth: []
      description: |
        Retorna métricas sobre los **servicios** del **Doctor** autenticado y su rating:
        - `totalServicios` — total de servicios registrados
        - `serviciosActivos` — con estado `Activo`
        - `serviciosInactivos` — con estado `Inactivo`
        - `promedioRating` — `calificacionPromedio` del doctor (`null` si aún no tiene reseñas)
      responses:
        '200':
          description: Estadísticas de servicios obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalServicios:
                        type: integer
                        example: 8
                      serviciosActivos:
                        type: integer
                        example: 6
                      serviciosInactivos:
                        type: integer
                        example: 2
                      promedioRating:
                        type: number
                        format: float
                        nullable: true
                        example: 4.7
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

  /doctores/estadisticas/pacientes:
    get:
      summary: Estadísticas de pacientes del doctor autenticado
      tags:
        - Doctores
      security:
        - bearerAuth: []
      description: |
        Retorna métricas agregadas de los **pacientes únicos** que han tenido al menos
        una cita con el doctor autenticado.

        Todos los filtros son opcionales. Si no se aplica ninguno, se considera el historial completo.

        **Métricas devueltas:**
        - `totalPacientes` — pacientes únicos deduplicados por cita
        - `pacientesConCondicionesActivas` — con ≥1 `CaracteristicaEspecial` en estado `Activo`
        - `pacientesConAlergias` — subconjunto con `CondicionMedica.tipo = "Alergia"` activa
        - `edadPromedio` — promedio de edades redondeado a 1 decimal (`null` si no hay datos)
      parameters:
        - name: fechaDesde
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-01-01"
          description: "Filtrar citas desde esta fecha (YYYY-MM-DD)"
        - name: fechaHasta
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-03-31"
          description: "Filtrar citas hasta esta fecha (YYYY-MM-DD)"
        - name: servicioId
          in: query
          required: false
          schema:
            type: integer
          example: 3
          description: "Filtrar por un servicio específico del doctor"
      responses:
        '200':
          description: Estadísticas de pacientes obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  filtros:
                    type: object
                    properties:
                      fechaDesde:
                        type: string
                        nullable: true
                        example: "2026-01-01"
                      fechaHasta:
                        type: string
                        nullable: true
                        example: "2026-03-31"
                      servicioId:
                        type: integer
                        nullable: true
                        example: 3
                  data:
                    type: object
                    properties:
                      totalPacientes:
                        type: integer
                        description: Total de pacientes únicos del doctor
                        example: 45
                      pacientesConCondicionesActivas:
                        type: integer
                        description: Pacientes con al menos una condición médica activa
                        example: 12
                      pacientesConAlergias:
                        type: integer
                        description: Pacientes con al menos una alergia activa
                        example: 8
                      edadPromedio:
                        type: number
                        format: float
                        nullable: true
                        description: Edad promedio de los pacientes (1 decimal). Null si no hay datos.
                        example: 34.7
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Acceso denegado (solo Doctor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /doctores/estadisticas/citas:
    get:
      summary: Estadísticas de citas del doctor autenticado
      tags:
        - Doctores
      security:
        - bearerAuth: []
      description: |
        Retorna conteos de citas del doctor autenticado, agrupados por estado.

        Todos los filtros son opcionales. Si no se aplica ninguno, se considera el historial completo.

        **Métricas devueltas:**
        - `totalCitas` — total de citas registradas
        - `citasProgramadas` — en estado `Programada`
        - `citasCanceladas` — en estado `Cancelada`
        - `citasCompletadas` — en estado `Completada`
      parameters:
        - name: fechaDesde
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-01-01"
          description: "Filtrar citas desde esta fecha (YYYY-MM-DD)"
        - name: fechaHasta
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-03-31"
          description: "Filtrar citas hasta esta fecha (YYYY-MM-DD)"
        - name: servicioId
          in: query
          required: false
          schema:
            type: integer
          example: 3
          description: "Filtrar por un servicio específico del doctor"
      responses:
        '200':
          description: Estadísticas de citas obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  filtros:
                    type: object
                    properties:
                      fechaDesde:
                        type: string
                        nullable: true
                        example: "2026-01-01"
                      fechaHasta:
                        type: string
                        nullable: true
                        example: "2026-03-31"
                      servicioId:
                        type: integer
                        nullable: true
                        example: 3
                  data:
                    type: object
                    properties:
                      totalCitas:
                        type: integer
                        description: Total de citas registradas
                        example: 120
                      citasProgramadas:
                        type: integer
                        description: Citas en estado Programada
                        example: 40
                      citasCanceladas:
                        type: integer
                        description: Citas en estado Cancelada
                        example: 15
                      citasCompletadas:
                        type: integer
                        description: Citas en estado Completada
                        example: 65
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Acceso denegado (solo Doctor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /doctores/inactividad:

    post:
      summary: Registrar período de inactividad (Doctor)
      tags:
        - Doctores
        - Citas
      description: |
        Permite al **Doctor** registrar un período de inactividad (vacaciones, emergencias, etc.).

        **Efecto automático:** todas las citas en estado `Programada` o `Reprogramada` que caigan
        dentro del rango `[fechaInicio + horaInicio, fechaFin + horaFin]` serán **canceladas automáticamente**.

        El período queda en estado `Activo`. Puede cancelarse con `DELETE /doctores/inactividad/{periodoId}`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fechaInicio
                - fechaFin
              properties:
                fechaInicio:
                  type: string
                  format: date
                  description: Fecha de inicio del período (YYYY-MM-DD)
                  example: "2026-04-01"
                horaInicio:
                  type: string
                  description: Hora de inicio en formato HH:MM (UTC). Si se omite, se usa **00:00** (inicio del día).
                  pattern: '^\d{2}:\d{2}$'
                  example: "08:00"
                fechaFin:
                  type: string
                  format: date
                  description: Fecha de fin del período (YYYY-MM-DD). Debe ser igual o posterior a fechaInicio.
                  example: "2026-04-07"
                horaFin:
                  type: string
                  description: Hora de fin en formato HH:MM (UTC). Si se omite, se usa **23:59** (fin del día).
                  pattern: '^\d{2}:\d{2}$'
                  example: "18:00"
                motivo:
                  type: string
                  description: Motivo del período de inactividad (opcional)
                  example: "Vacaciones de Semana Santa"

      responses:
        '201':
          description: Período de inactividad registrado y citas afectadas canceladas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      periodo:
                        type: object
                        properties:
                          id_periodo:
                            type: integer
                            example: 1
                          id_doctor:
                            type: integer
                            example: 5
                          fecha_inicio:
                            type: string
                            format: date-time
                            example: "2026-04-01T00:00:00.000Z"
                          fecha_fin:
                            type: string
                            format: date-time
                            example: "2026-04-07T23:59:59.000Z"
                          motivo:
                            type: string
                            example: "Vacaciones de Semana Santa"
                          estado:
                            type: string
                            example: "Activo"
                      citasCanceladas:
                        type: integer
                        description: Número de citas que fueron canceladas automáticamente
                        example: 3
                  message:
                    type: string
                    example: "Período de inactividad registrado. 3 cita(s) cancelada(s)."
        '400':
          description: fechaFin no es posterior a fechaInicio o parámetros inválidos
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

    get:
      summary: Listar períodos de inactividad del doctor autenticado
      tags:
        - Doctores
        - Citas
      description: |
        Retorna todos los períodos de inactividad del **Doctor** autenticado, ordenados por `fecha_inicio` descendente.

        **Traducción automática:** Agrega `?target=en&translate_fields=motivo` para traducir el motivo de inactividad.
      security:
        - bearerAuth: []
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "motivo"
          description: "Campos a traducir separados por coma"
      responses:
        '200':
          description: Lista de períodos de inactividad
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id_periodo:
                          type: integer
                          example: 1
                        fecha_inicio:
                          type: string
                          format: date-time
                          example: "2026-04-01T00:00:00.000Z"
                        fecha_fin:
                          type: string
                          format: date-time
                          example: "2026-04-07T23:59:59.000Z"
                        motivo:
                          type: string
                          nullable: true
                          example: "Vacaciones de Semana Santa"
                        estado:
                          type: string
                          enum: ["Activo", "Cancelado"]
                          example: "Activo"
                        creado_en:
                          type: string
                          format: date-time
                          example: "2026-03-01T10:00:00.000Z"
        '401':
          description: No autenticado
        '403':
          description: Acceso denegado (solo Doctor)

  /doctores/inactividad/{periodoId}:
    delete:
      summary: Cancelar un período de inactividad (Doctor)
      tags:
        - Doctores
        - Citas
      description: |
        Permite al **Doctor** cancelar un período de inactividad propio que esté en estado `Activo`.

        > **Nota:** Al cancelar el período, las citas previamente canceladas **no se reactivan automáticamente**.
        > El doctor deberá gestionar el reagendamiento manualmente si así lo desea.
      security:
        - bearerAuth: []
      parameters:
        - name: periodoId
          in: path
          required: true
          description: ID del período de inactividad
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Período de inactividad cancelado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_periodo:
                        type: integer
                        example: 1
                      estado:
                        type: string
                        example: "Cancelado"
                  message:
                    type: string
                    example: "Período de inactividad cancelado."
        '400':
          description: El período ya fue cancelado anteriormente
        '401':
          description: No autenticado
        '403':
          description: No tienes permisos para cancelar este período / Acceso denegado
        '404':
          description: Período de inactividad no encontrado

  /doctores/solicitudes-alianza:

    post:
      summary: Doctor envía solicitud de alianza a un centro de salud
      tags:
        - Doctores
        - SolicitudesAlianza
      security:
        - bearerAuth: []
      description: |
        El doctor autenticado envía una solicitud de alianza a un centro de salud.
        
        **Reglas:**
        - No puede existir una solicitud Pendiente o Aceptada entre el mismo doctor y centro
        - El centro recibirá la solicitud y será el único que puede aceptarla o rechazarla
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - destinatarioId
              properties:
                destinatarioId:
                  type: integer
                  description: ID (usuarioId) del centro de salud al que se envía la solicitud
                  example: 10
                mensaje:
                  type: string
                  maxLength: 255
                  example: "Me gustaría colaborar en su centro de salud"
      responses:
        '201':
          description: Solicitud enviada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Solicitud de alianza enviada exitosamente"
                  data:
                    $ref: '#/components/schemas/SolicitudAlianza'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ya existe una alianza o solicitud pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Listar solicitudes de alianza del doctor
      tags:
        - Doctores
        - SolicitudesAlianza
      security:
        - bearerAuth: []
      description: |
        Retorna todas las solicitudes de alianza del doctor autenticado, tanto las que el doctor inició como las que recibió de centros.
        Ordenadas de más reciente a más antigua.

        **Traducción automática:** Agrega `?target=en&translate_fields=mensaje,motivoRechazo` para traducir los mensajes.
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: "Idioma origen (opcional, default: es)"
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "mensaje,motivoRechazo"
          description: "Campos a traducir separados por coma"
      responses:
        '200':
          description: Lista de solicitudes de alianza
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SolicitudAlianza'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /doctores/solicitudes-alianza/{id}:
    put:
      summary: Doctor responde a una solicitud de alianza (iniciada por el centro)
      tags:
        - Doctores
        - SolicitudesAlianza
      security:
        - bearerAuth: []
      description: |
        El doctor acepta o rechaza una solicitud que **inició un centro de salud**.
        
        **Reglas:**
        - Solo se pueden responder solicitudes en estado `Pendiente`
        - Solo puede responder el doctor destinatario (el que no inició)
        - Al rechazar, `motivoRechazo` es obligatorio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la solicitud de alianza
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estado
              properties:
                estado:
                  type: string
                  enum: [Aceptada, Rechazada]
                  example: "Aceptada"
                motivoRechazo:
                  type: string
                  maxLength: 255
                  example: "No puedo comprometerme en este momento"
      responses:
        '200':
          description: Solicitud respondida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Solicitud aceptada exitosamente"
                  data:
                    $ref: '#/components/schemas/SolicitudAlianza'
        '400':
          description: Estado inválido o solicitud no en estado Pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tienes permisos para responder esta solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Solicitud no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

