        - name: servicioId
          in: query
          schema:
            type: integer
          description: Filtrar por ID del servicio (opcional)
        - name: horarioId
          in: query
          schema:
            type: integer
          description: Filtrar por ID del horario (opcional)
        - name: estado
          in: query
          schema:
            type: string
            enum: ["Activo", "Inactivo"]
          description: Filtrar por estado (opcional)
        - name: pagina
          in: query
          schema:
            type: integer
            example: 1
          description: Número de página (por defecto 1)
