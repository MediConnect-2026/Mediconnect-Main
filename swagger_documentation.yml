    patch:
      summary: Editar cita (Paciente)
      tags:
        - Citas
      description: |
        Permite al paciente editar su cita.
        **Solo si la cita está en estado `Programada`.**

        Todos los campos son opcionales.
        - `fechaFin` **no se envía** — se recalcula automáticamente como `fechaInicio + duracionMinutos` del servicio.
        - `totalAPagar` se recalcula automáticamente si cambia `servicioId` o `numPacientes`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                servicioId:
                  type: integer
                  description: ID del servicio (si cambia, recalcula precio y fechaFin)
                  example: 2
                horarioId:
                  type: integer
                  example: 1
                fecha:
                  type: string
                  format: date
                  description: Fecha de la cita en formato YYYY-MM-DD
                  example: "2026-03-15"
                hora:
                  type: string
                  description: Hora de inicio en formato HH:MM (UTC)
                  example: "10:00"
                modalidad:
                  type: string
                  enum: ["Presencial", "Virtual", "Domicilio"]
                  example: "Virtual"
                numPacientes:
                  type: integer
                  example: 1
                seguroId:
                  type: integer
                  nullable: true
                  example: 1
                tipoSeguroId:
                  type: integer
                  nullable: true
                  example: 1
                motivoConsulta:
                  type: string
                  example: "Control de presión arterial"
      responses:
        '200':
          description: Cita actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CitaDetalle'
                  message:
                    type: string
        '400':
          description: La cita no está en estado Programada o datos inválidos
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Paciente y ser dueño de la cita)
        '404':
          description: Cita no encontrada
        '500':
          description: Error interno del servidor

