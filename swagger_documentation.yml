      tags:
        - Citas
      description: |
        Cancela una cita. Disponible para **Paciente** y **Doctor**.
        - Solo se pueden cancelar citas en estado `Programada` o `Reprogramada`.
        - El motivo de cancelación es **obligatorio**.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - motivoCancelacion
              properties:
                motivoCancelacion:
                  type: string
                  example: "Surgió un imprevisto personal"
      responses:
        '200':
          description: Cita cancelada exitosamente
        '400':
          description: Estado inválido para cancelar o motivo faltante
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: Cita no encontrada
        '500':
          description: Error interno del servidor

  /citas/{id}/reprogramar:
    patch:
      summary: Reprogramar una cita (Doctor)
      tags:
        - Citas
      description: |
        Permite al **Doctor** reprogramar una cita a un nuevo horario y fecha.
        - Solo citas en estado `Programada` o `Reprogramada`.
        - El estado cambia a `Reprogramada`.
        - `fechaFin` es registrada automáticamente por el sistema cuando la cita se **completa**.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - horarioId
                - fecha
                - hora
              properties:
                horarioId:
                  type: integer
                  example: 3
                fecha:
                  type: string
                  description: Nueva fecha en formato YYYY-MM-DD (UTC)
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  example: "2026-03-15"
                hora:
                  type: string
                  description: Nueva hora de inicio en formato HH:MM (UTC)
                  pattern: '^\d{2}:\d{2}$'
                  example: "10:00"
      responses:
        '200':
          description: Cita reprogramada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CitaDetalle'
                  message:
                    type: string
        '400':
          description: Estado inválido para reprogramar
        '401':
          description: No autenticado
        '403':
          description: No autorizado (requiere rol Doctor y ser el doctor de la cita)
        '404':
          description: Cita no encontrada
        '500':
          description: Error interno del servidor

