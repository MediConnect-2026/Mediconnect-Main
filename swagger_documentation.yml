      tags:
        - Mensajes
      description: Soft delete - Solo el remitente puede eliminar
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Mensaje eliminado exitosamente

  /seguros:
    post:
      tags:
        - Seguros
      summary: Crear seguro médico (Admin)
      description: Permite a un administrador crear un nuevo seguro médico
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  example: "Seguro Universal"
                urlImage:
                  type: string
                  example: "https://example.com/logo.png"
      responses:
        '201':
          description: Seguro creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Seguro creado exitosamente"
                  data:
                    $ref: '#/components/schemas/SeguroMedico'
        '400':
          description: Error de validación
        '401':
          description: No autorizado
        '403':
          description: No tiene permisos (requiere rol Admin)

    get:
      tags:
        - Seguros
      summary: Listar seguros (Admin)
      description: |-
        Obtiene todos los seguros médicos con paginación
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/seguros?target=en&translate_fields=nombre`
      security:
        - bearerAuth: []
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            enum: [Activo, Inactivo]
        - name: pagina
          in: query
          schema:
            type: integer
            default: 1
        - name: limite
          in: query
          schema:
            type: integer
            default: 20
        - name: target
          in: query
          required: false
          schema:
            type: string
          description: "Código de idioma ISO 639-1 para traducir los resultados (ej: 'en', 'es', 'fr')"
          example: "en"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          description: "Campos a traducir separados por comas (ej: 'nombre')"
          example: "nombre"
      responses:
        '200':
          description: Seguros obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SeguroMedico'
                  total:
                    type: integer
                  pagina:
                    type: integer
                  limite:
                    type: integer

  /seguros/{id}:
    patch:
      tags:
        - Seguros
      summary: Actualizar seguro (Admin)
      description: Actualiza un seguro médico existente
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
