  # --- CITAS ENDPOINTS ---
  /citas:
    post:
      summary: Agendar una cita
      tags:
        - Citas
      description: |
        Permite a un **Paciente** agendar una nueva cita médica.

        **Validaciones realizadas:**
        - El servicio debe existir y estar `Activo`
        - El horario debe pertenecer al servicio seleccionado y estar `Activo`
        - El **día de la semana** de `fechaInicio` debe coincidir con los días configurados en el horario
        - La **hora** de `fechaInicio` debe caer dentro del rango `horaInicio–horaFin` del horario
        - El doctor **no debe tener otra cita activa** (de cualquier servicio) que solape con la franja horaria solicitada
        - El doctor **no debe tener un período de inactividad** que solape con la franja horaria
        - Si se proporciona seguro, debe estar activo para el paciente y ser aceptado por el doctor
        - `totalAPagar` se calcula automáticamente como `precio × numPacientes`
        - `fechaFin` es registrada automáticamente por el sistema cuando la cita se **completa**

        **Tip:** Usa `GET /servicios/{id}/slots?fecha=YYYY-MM-DD` para obtener los slots disponibles antes de agendar.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - servicioId
                - horarioId
                - fecha
                - hora
                - modalidad
              properties:
                servicioId:
                  type: integer
                  example: 1
                horarioId:
                  type: integer
                  description: ID del horario obtenido desde `GET /servicios/{id}/slots`
                  example: 2
                fecha:
                  type: string
                  description: Fecha de la cita en formato YYYY-MM-DD (UTC)
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  example: "2026-03-10"
                hora:
                  type: string
                  description: Hora de inicio del slot seleccionado en formato HH:MM (UTC)
                  pattern: '^\d{2}:\d{2}$'
                  example: "09:00"
                modalidad:
                  type: string
                  enum: ["Presencial", "Virtual", "Domicilio"]
                  example: "Presencial"
                numPacientes:
                  type: integer
                  default: 1
                  example: 2
                seguroId:
                  type: integer
                  nullable: true
                  example: 1
                tipoSeguroId:
                  type: integer
                  nullable: true
                  example: 3
                motivoConsulta:
                  type: string
                  example: "Dolor de cabeza persistente desde hace 3 días"
      responses:
        '201':
          description: Cita agendada exitosamente
          content:
            application/json:
              schema:
