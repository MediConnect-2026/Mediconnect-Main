  # --- FORMACIONES ACADÉMICAS ENDPOINTS ---
  /formaciones-academicas/doctor/{doctorId}:
    get:
      summary: Ver formaciones académicas de un doctor
      tags:
        - FormacionesAcademicas
      description: |
        Retorna todas las formaciones académicas **activas** de un doctor específico.
        Accesible por cualquier usuario autenticado (pacientes, otros doctores, administradores).

        Soporta traducción automática: `?target=en&translate_fields=nombre`
      security:
        - bearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: integer
          description: ID del doctor
          example: 5
        - name: pagina
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Número de página
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Cantidad de resultados por página
        - name: target
          in: query
          required: false
          schema:
            type: string
          description: "Idioma destino para traducción"
          example: en
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          description: "Campos a traducir separados por coma"
          example: "nombre"
      responses:
        '200':
          description: Formaciones académicas obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Formaciones académicas del doctor obtenidas exitosamente"
                  data:
                    type: object
                    properties:
                      formaciones:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            doctorId:
                              type: integer
                              example: 5
                            nombre:
                              type: string
                              example: "Medicina General"
                            fechaInicio:
                              type: string
                              format: date
                              example: "2005-09-01"
                            fechaFinalizacion:
                              type: string
                              format: date
                              nullable: true
                              example: "2011-06-30"
                            enCurso:
                              type: boolean
                              example: false
                            universidad:
                              type: object
                              properties:
                                nombre:
                                  type: string
                                  example: "Pontificia Universidad Católica Madre y Maestra"
                                pais:
                                  type: object
                                  properties:
                                    id:
                                      type: integer
                                      example: 1
                                    nombre:
                                      type: string
                                      example: "República Dominicana"
                      total:
                        type: integer
                        example: 2
        '400':
          description: ID de doctor inválido
        '401':
          description: No autenticado

  /formaciones-academicas:
    post:
      summary: Crear una nueva formación académica
      tags:
        - FormacionesAcademicas
      description: |
        Crea una nueva formación académica para el doctor autenticado. 
        El doctor se obtiene automáticamente del token JWT.
        Valida que no exista una formación duplicada (mismo doctor, universidad y nombre) y que las fechas sean coherentes.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - universidadId
                - nombre
                - fechaInicio
              properties:
                universidadId:
                  type: integer
                  example: 5
                  description: ID de la universidad
                nombre:
                  type: string
                  example: "Tecnólogo en Radiología"
                  description: Nombre de la formación académica
                fechaInicio:
                  type: string
                  format: date
                  example: "2015-01-15"
                  description: Fecha de inicio de la formación (ISO 8601)
                fechaFinalizacion:
                  type: string
                  format: date
                  example: "2019-06-30"
                  description: Fecha de finalización (ISO 8601). Requerida si enCurso es false
                enCurso:
                  type: boolean
                  example: false
                  default: false
                  description: Indica si la formación está actualmente en curso. Si es true, no requiere fechaFinalizacion
                estado:
                  type: string
                  enum: ["Activo", "Inactivo"]
                  example: "Activo"
                  default: "Activo"
                  description: Estado de la formación académica
      responses:
        '201':
          description: Formación académica creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Formación académica creada exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/FormacionAcademica'
        '400':
          description: Datos inválidos (fechas inválidas, formación duplicada, campos faltantes, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Doctor o universidad no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Obtener todas las formaciones académicas del doctor autenticado
      tags:
        - FormacionesAcademicas
      description: |
        Lista todas las formaciones académicas del doctor autenticado con soporte para filtros y paginación.
        Los resultados se ordenan por estado (Activo primero) y luego por fecha de inicio descendente.
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/formaciones-academicas?target=en&translate_fields=nombre,universidad.nombre`
      security:
        - bearerAuth: []
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre,universidad.nombre"
          description: Campos a traducir separados por coma
        - name: estado
          in: query
          schema:
            type: string
            enum: ["Activo", "Inactivo", "Eliminado"]
          description: Filtrar por estado
        - name: busqueda
          in: query
          schema:
            type: string
          description: Buscar en nombre de la formación y nombre de universidad
        - name: pagina
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Número de página
        - name: limite
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Cantidad de resultados por página
      responses:
        '200':
          description: Lista de formaciones académicas
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Formaciones académicas obtenidas exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      formaciones:
                        type: array
                        items:
                          $ref: '#/components/schemas/FormacionAcademica'
                      total:
                        type: integer
                        example: 15
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /formaciones-academicas/{id}:
    get:
      summary: Obtener una formación académica por ID
      tags:
        - FormacionesAcademicas
      description: |
        Obtiene los detalles completos de una formación académica específica por su ID.
        Accesible por cualquier usuario autenticado (pacientes, doctores, administradores).

        **Traducción Automática:**
        Ejemplo: `/api/formaciones-academicas/1?target=en&translate_fields=nombre`
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la formación académica
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: Idioma destino para traducción automática
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          description: Idioma origen
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre"
          description: Campos a traducir separados por coma
      responses:
        '200':
          description: Formación académica encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Formación académica obtenida exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/FormacionAcademica'
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Formación académica no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Actualizar una formación académica
      tags:
        - FormacionesAcademicas
      description: |
        Actualiza una formación académica existente. Todos los campos son opcionales, pero al menos uno debe ser proporcionado.
        Se mantienen las validaciones de negocio (fechas coherentes, no duplicados, etc.).
        
        Si enCurso se actualiza a true, fechaFinalizacion debe ser null.
        Si enCurso se actualiza a false, fechaFinalizacion es requerida.
        
        **Autenticación requerida:** Solo el doctor autenticado puede actualizar sus propias formaciones.
        Si la formación no pertenece al doctor autenticado, se retornará 403 Forbidden.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la formación académica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                universidadId:
                  type: integer
                  example: 7
                  description: ID de la universidad
                nombre:
                  type: string
                  example: "Licenciatura en Radiología"
                  description: Nombre de la formación académica
                fechaInicio:
                  type: string
                  format: date
                  example: "2015-02-01"
                  description: Fecha de inicio
                fechaFinalizacion:
                  type: string
                  format: date
                  example: "2019-07-15"
                  description: Fecha de finalización (requerida si enCurso es false)
                enCurso:
                  type: boolean
                  example: false
                  description: Indica si la formación está en curso
                estado:
                  type: string
                  enum: ["Activo", "Inactivo", "Eliminado"]
                  example: "Activo"
                  description: Estado de la formación
      responses:
        '200':
          description: Formación académica actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Formación académica actualizada exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/FormacionAcademica'
        '400':
          description: Datos inválidos (fechas inválidas, formación duplicada, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tienes permiso para actualizar esta formación
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "No tienes permiso para actualizar esta formación académica"
        '404':
          description: Formación académica o universidad no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Eliminar una formación académica (soft delete)
      tags:
        - FormacionesAcademicas
      description: |
        Elimina lógicamente una formación académica marcándola como "Eliminado". No se elimina físicamente del sistema para preservar el historial.
        
        **Autenticación requerida:** Solo el doctor autenticado puede eliminar sus propias formaciones.
        Si la formación no pertenece al doctor autenticado, se retornará 403 Forbidden.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de la formación académica
      responses:
        '200':
          description: Formación académica eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Formación académica eliminada exitosamente"
                  success:
                    type: boolean
                    example: true
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tienes permiso para eliminar esta formación
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "No tienes permiso para eliminar esta formación académica"
        '404':
          description: Formación académica no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    # --- AUTENTICACIÓN ENDPOINTS ---
  
  /auth/login:
    post:
      summary: Login con email y password
      tags:
        - Autenticación
      description: Autentica un usuario con su email y contraseña, retornando un token JWT válido por 24 horas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@mediconnect.com"
                  description: Email del usuario
                password:
                  type: string
                  format: password
                  example: "123456"
                  description: Contraseña del usuario
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Login exitoso"
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                        description: Token JWT válido por 24 horas
                      usuario:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          email:
                            type: string
                            example: "usuario@mediconnect.com"
                          rol:
                            type: string
                            example: "Paciente"
                            enum: ["Paciente", "Doctor", "CentroSalud", "Administrador"]
                          fotoPerfil:
                            type: string
                            nullable: true
                            example: "https://example.com/foto.jpg"
        '400':
          description: Email o password no proporcionados
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Email y password son requeridos"
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Credenciales inválidas"
        '403':
          description: Usuario inactivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Usuario inactivo. Contacta al administrador"
        '500':
          description: Error interno del servidor

  # --- NOTIFICACIONES ENDPOINTS ---
  /notificaciones:
    get:
      summary: Obtener notificaciones del usuario
      tags:
        - Notificaciones
      description: |
        Obtiene las notificaciones del usuario autenticado con soporte para filtros y paginación.
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos. Agrega los siguientes parámetros de query:
        
        - `target`: Idioma destino (ej: en, fr, de)

        - `source`: Idioma origen (opcional, default: es)

        - `translate_fields`: Campos a traducir separados por coma (ej: titulo,mensaje)
        
        Ejemplo: `/api/notificaciones?target=en&translate_fields=titulo,mensaje`
        
      security:
        - bearerAuth: []
      parameters:
        - name: usuarioId
          in: query
          schema:
            type: integer
          description: ID del usuario (temporal, en producción viene del JWT)
          example: 1
        - name: leidas
          in: query
          schema:
            type: boolean
          description: Filtrar por notificaciones leídas (true) o no leídas (false)
          example: false
        - name: tipoAlerta
          in: query
          schema:
            type: string
            enum: ["Informacion", "Advertencia", "Error", "Exito"]
          description: Filtrar por tipo de alerta
          example: "Informacion"
        - name: tipoEntidad
          in: query
          schema:
            type: string
            enum: ["Cita", "Mensaje", "Resena", "Usuario", "Sistema"]
          description: Filtrar por tipo de entidad relacionada
          example: "Cita"
        - name: limite
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Número máximo de resultados por página
          example: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Número de resultados a omitir (para paginación)
          example: 0
        - name: target
          in: query
          schema:
            type: string
          description: "Idioma destino para traducción automática (activa la traducción)"
          example: "en"
        - name: source
          in: query
          schema:
            type: string
            default: "es"
          description: Idioma origen para traducción automática
          example: "es"
        - name: translate_fields
          in: query
          schema:
            type: string
          description: Campos a traducir separados por coma (ej titulo,mensaje)
          example: "titulo,mensaje"
      responses:
        '200':
          description: Notificaciones obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Notificaciones obtenidas exitosamente"
                  data:
                    type: object
                    properties:
                      notificaciones:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notificacion'
                      total:
                        type: integer
                        example: 10
                      noLeidas:
                        type: integer
                        example: 3
        '400':
          description: Parámetros inválidos
        '500':
          description: Error interno del servidor

    post:
      summary: Crear una nueva notificación
      tags:
        - Notificaciones
      description: Crea una nueva notificación para un usuario. La notificación se enviará automáticamente en tiempo real vía WebSocket si el usuario está conectado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - usuarioId
                - titulo
                - mensaje
              properties:
                usuarioId:
                  type: integer
                  example: 1
                  description: ID del usuario destinatario
                titulo:
                  type: string
                  maxLength: 100
                  example: "Nueva cita programada"
                  description: Título de la notificación (máximo 100 caracteres)
                mensaje:
                  type: string
                  example: "Tu cita con el Dr. Pérez está confirmada para mañana a las 10:00 AM"
                  description: Contenido del mensaje
                tipoAlerta:
                  type: string
                  enum: ["Informacion", "Advertencia", "Error", "Exito"]
                  default: "Informacion"
                  example: "Exito"
                  description: Tipo de alerta para el estilo visual
                tipoEntidad:
                  type: string
                  enum: ["Cita", "Mensaje", "Resena", "Usuario", "Sistema"]
                  nullable: true
                  example: "Cita"
                  description: Tipo de entidad relacionada (opcional)
                entidadId:
                  type: integer
                  nullable: true
                  example: 123
                  description: ID de la entidad relacionada (opcional)
      responses:
        '201':
          description: Notificación creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: "Notificación creada exitosamente"
                  data:
                    $ref: '#/components/schemas/Notificacion'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor

  /notificaciones/{id}:
    get:
      summary: Obtener notificación por ID
      tags:
        - Notificaciones
