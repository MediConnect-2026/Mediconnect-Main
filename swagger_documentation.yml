  # --- PAÍSES ENDPOINTS ---
  /paises:
    get:
      summary: Obtener todos los países
      tags:
        - Paises
      description: |
        Obtiene una lista paginada de países con opciones de filtrado y búsqueda. **Nota**: Sin filtros utiliza caché Redis (TTL 1 hora) para optimizar performance.
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos. Agrega los siguientes parámetros de query:
        
        - `target`: Idioma destino (ej: en, fr, de)
        - `source`: Idioma origen (opcional, default: es)
        - `translate_fields`: Campos a traducir separados por coma (ej: nombre)
        
        Ejemplo: `/api/paises?target=en&translate_fields=nombre`
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            default: "Activo"
          description: Filtrar por estado (Activo, Inactivo)
          example: "Activo"
        - name: busqueda
          in: query
          schema:
            type: string
          description: Buscar por nombre o código ISO
          example: "Republica"
        - name: pagina
          in: query
          schema:
            type: integer
            default: 1
          description: Número de página
        - name: limite
          in: query
          schema:
            type: integer
            default: 10
          description: Cantidad de registros por página
        - name: target
          in: query
          required: false
          schema:
            type: string
          example: "en"
          description: "Idioma destino para traducción automática (activa la traducción)"
        - name: source
          in: query
          required: false
          schema:
            type: string
            default: "es"
          example: "es"
          description: Idioma origen para traducción automática
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          example: "nombre"
          description: Campos a traducir separados por coma (ej nombre,codigo_iso)
      responses:
        '200':
          description: Lista de países obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Países obtenidos exitosamente"
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      paises:
                        type: array
                        items:
                          $ref: '#/components/schemas/Pais'
                      total:
                        type: integer
                        example: 195
        '400':
          description: Parámetros inválidos

    post:
      summary: Crear un nuevo país
      tags:
        - Paises
      description: Crea un nuevo país. Requiere autenticación como Admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
