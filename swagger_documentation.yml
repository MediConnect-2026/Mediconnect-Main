      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idSeguro
                - idTipoSeguro
              properties:
                idSeguro:
                  type: integer
                  example: 1
                idTipoSeguro:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Seguro agregado exitosamente
        '400':
          description: Error - Ya tiene 3 seguros o seguro duplicado

    get:
      tags:
        - Seguros
      summary: Obtener mis seguros (Paciente)
      description: |-
        Obtiene los seguros del paciente autenticado. Por defecto solo muestra seguros activos.
        
        **Historial:**
        Los seguros eliminados se marcan como "Eliminado" (no se borran). 
        Usa `incluirHistorial=true` para ver el historial completo.
        
        **Traducción Automática:**
        Este endpoint soporta traducción automática de campos mediante query params.
        Ejemplo: `/api/seguros/mis-seguros?target=en&translate_fields=nombre`
      security:
        - bearerAuth: []
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
          description: "Código de idioma ISO 639-1 para traducir los resultados (ej: 'en', 'es', 'fr')"
          example: "en"
        - name: translate_fields
          in: query
          required: false
          schema:
            type: string
          description: "Campos a traducir separados por comas (ej: 'nombre')"
          example: "nombre"
        - name: incluirHistorial
          in: query
          required: false
          schema:
            type: boolean
          description: "Si es true, incluye seguros eliminados en el historial. Por defecto solo muestra seguros activos."
          example: false
      responses:
        '200':
          description: Seguros obtenidos exitosamente


  /seguros/mis-seguros/{id}:
    delete:
      tags:
        - Seguros
      summary: Eliminar mi seguro (Paciente)
      description: |-
        Marca un seguro como "Eliminado" (soft delete). El registro se mantiene en el historial.
        El paciente puede volver a agregar el mismo seguro, creando un nuevo registro activo.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Seguro eliminado exitosamente

